<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bodyMini" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="30%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#bbb"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="micHole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="80%" stop-color="#111"/>
      <stop offset="100%" stop-color="#333"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="1"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" fill="#f5f5f0"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#111" letter-spacing="8">KOE MINI</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#888" letter-spacing="3">ALWAYS-ON AI VOICE PENDANT</text>
  <text x="400" y="90" text-anchor="middle" font-size="11" fill="#aaa">25 x 30 x 9mm / 5g</text>

  <!-- ============ FRONT VIEW ============ -->
  <text x="200" y="130" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">FRONT</text>

  <!-- Body - pill shape -->
  <rect x="120" y="150" width="160" height="200" rx="80" ry="80" fill="url(#bodyMini)" filter="url(#shadow)"/>
  <!-- Subtle edge highlight -->
  <rect x="122" y="152" width="156" height="196" rx="78" ry="78" fill="none" stroke="#444" stroke-width="0.5"/>

  <!-- Top chamfer/bevel -->
  <ellipse cx="200" cy="170" rx="60" ry="15" fill="#222" opacity="0.5"/>

  <!-- Mic hole (top) -->
  <circle cx="200" cy="200" r="6" fill="url(#micHole)"/>
  <circle cx="200" cy="200" r="7" fill="none" stroke="#333" stroke-width="0.5"/>
  <!-- Mic grille dots -->
  <circle cx="196" cy="196" r="0.8" fill="#222"/>
  <circle cx="200" cy="194" r="0.8" fill="#222"/>
  <circle cx="204" cy="196" r="0.8" fill="#222"/>
  <circle cx="196" cy="200" r="0.8" fill="#222"/>
  <circle cx="204" cy="200" r="0.8" fill="#222"/>
  <circle cx="196" cy="204" r="0.8" fill="#222"/>
  <circle cx="200" cy="206" r="0.8" fill="#222"/>
  <circle cx="204" cy="204" r="0.8" fill="#222"/>

  <!-- LED indicator -->
  <circle cx="200" cy="250" r="3" fill="#0f0"/>
  <circle cx="200" cy="250" r="12" fill="url(#ledGlow)"/>

  <!-- Koe logo (minimal) -->
  <text x="200" y="290" text-anchor="middle" font-size="10" fill="#444" letter-spacing="4" font-weight="300">声</text>

  <!-- USB-C slot (bottom) -->
  <rect x="191" y="335" width="18" height="6" rx="3" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>

  <!-- ============ SIDE VIEW ============ -->
  <text x="430" y="130" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">SIDE</text>

  <!-- Side profile - 9mm thin -->
  <rect x="410" y="150" width="40" height="200" rx="20" ry="20" fill="url(#bodyMini)" filter="url(#shadow)"/>
  <rect x="412" y="152" width="36" height="196" rx="18" ry="18" fill="none" stroke="#444" stroke-width="0.5"/>

  <!-- Side details -->
  <circle cx="430" cy="200" r="2" fill="#222"/> <!-- mic -->
  <rect x="425" y="335" width="10" height="4" rx="2" fill="#0a0a0a"/> <!-- USB-C -->

  <!-- Thickness annotation -->
  <line x1="460" y1="240" x2="480" y2="240" stroke="#c66" stroke-width="0.5"/>
  <line x1="410" y1="240" x2="400" y2="240" stroke="#c66" stroke-width="0.5"/>
  <text x="490" y="244" font-size="10" fill="#c66">9mm</text>

  <!-- ============ BACK VIEW ============ -->
  <text x="600" y="130" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">BACK</text>

  <rect x="520" y="150" width="160" height="200" rx="80" ry="80" fill="url(#bodyMini)" filter="url(#shadow)"/>
  <rect x="522" y="152" width="156" height="196" rx="78" ry="78" fill="none" stroke="#444" stroke-width="0.5"/>

  <!-- Magnetic mount ring -->
  <circle cx="600" cy="250" r="25" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="600" cy="250" r="23" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="600" y="254" text-anchor="middle" font-size="7" fill="#555">MAGNET</text>

  <!-- Regulatory text -->
  <text x="600" y="310" text-anchor="middle" font-size="5" fill="#333">FCC ID: XXXX | IC: XXXX</text>
  <text x="600" y="320" text-anchor="middle" font-size="5" fill="#333">Designed in Tokyo</text>

  <!-- ============ WEARING OPTIONS ============ -->
  <text x="400" y="420" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">WEARING STYLES</text>

  <!-- Pendant style -->
  <g transform="translate(120, 440)">
    <!-- Chain -->
    <path d="M60,0 Q60,20 60,30 Q58,35 60,40" stroke="#999" stroke-width="1" fill="none"/>
    <path d="M60,0 Q62,15 58,25" stroke="#bbb" stroke-width="0.5" fill="none"/>
    <!-- Device -->
    <rect x="30" y="40" width="60" height="75" rx="30" fill="url(#bodyMini)" filter="url(#shadow)"/>
    <circle cx="60" cy="65" r="3" fill="#333"/>
    <circle cx="60" cy="82" r="2" fill="#0f0"/>
    <text x="60" y="135" text-anchor="middle" font-size="10" fill="#888">Pendant</text>
  </g>

  <!-- Clip style -->
  <g transform="translate(300, 440)">
    <!-- Shirt pocket outline -->
    <path d="M30,30 L90,30 L90,90 L30,90 Z" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="60" y="80" text-anchor="middle" font-size="8" fill="#ccc">pocket</text>
    <!-- Clip -->
    <rect x="48" y="20" width="24" height="8" rx="2" fill="#999"/>
    <!-- Device on clip -->
    <rect x="35" y="28" width="50" height="62" rx="25" fill="url(#bodyMini)" filter="url(#shadow)"/>
    <circle cx="60" cy="50" r="2.5" fill="#333"/>
    <circle cx="60" cy="62" r="1.5" fill="#0f0"/>
    <text x="60" y="135" text-anchor="middle" font-size="10" fill="#888">Clip</text>
  </g>

  <!-- Pin badge style -->
  <g transform="translate(500, 440)">
    <!-- Lapel outline -->
    <path d="M20,20 L60,70 L100,20" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Device as badge -->
    <rect x="38" y="35" width="44" height="55" rx="22" fill="url(#bodyMini)" filter="url(#shadow)"/>
    <circle cx="60" cy="52" r="2.5" fill="#333"/>
    <circle cx="60" cy="65" r="1.5" fill="#0f0"/>
    <!-- Pin -->
    <line x1="60" y1="90" x2="60" y2="100" stroke="#999" stroke-width="1"/>
    <circle cx="60" cy="102" r="2" fill="#ccc"/>
    <text x="60" y="135" text-anchor="middle" font-size="10" fill="#888">Pin Badge</text>
  </g>

  <!-- ============ SIZE COMPARISON ============ -->
  <text x="400" y="620" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">SIZE COMPARISON (1:1 SCALE)</text>

  <!-- AirTag outline -->
  <g transform="translate(150, 640)">
    <circle cx="50" cy="50" r="40" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="50" y="54" text-anchor="middle" font-size="8" fill="#ccc">AirTag</text>
    <text x="50" y="65" text-anchor="middle" font-size="7" fill="#ccc">32mm dia</text>
  </g>

  <!-- Koe MINI (actual size at 96dpi ≈ 25x30mm) -->
  <g transform="translate(300, 640)">
    <rect x="15" y="10" width="60" height="75" rx="30" fill="url(#bodyMini)" filter="url(#shadow)"/>
    <circle cx="45" cy="35" r="2.5" fill="#333"/>
    <circle cx="45" cy="50" r="1.5" fill="#0f0"/>
    <text x="45" y="105" text-anchor="middle" font-size="8" fill="#333" font-weight="600">Koe MINI</text>
    <text x="45" y="115" text-anchor="middle" font-size="7" fill="#888">25x30mm</text>
  </g>

  <!-- 500 yen coin -->
  <g transform="translate(450, 640)">
    <circle cx="50" cy="50" r="35" fill="none" stroke="#c90" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#c90" stroke-width="0.5"/>
    <text x="50" y="48" text-anchor="middle" font-size="12" fill="#c90">500</text>
    <text x="50" y="60" text-anchor="middle" font-size="6" fill="#c90">¥</text>
    <text x="50" y="105" text-anchor="middle" font-size="7" fill="#888">26.5mm dia</text>
  </g>

  <!-- ============ SPECS ============ -->
  <rect x="50" y="780" width="700" height="100" rx="8" fill="#f0f0ed" stroke="#ddd"/>
  <text x="100" y="805" font-size="11" fill="#333" font-weight="600">Mic: INMP441 x1</text>
  <text x="100" y="822" font-size="11" fill="#333" font-weight="600">Speaker: None (BLE)</text>
  <text x="100" y="839" font-size="11" fill="#333" font-weight="600">Battery: 200mAh / 9h</text>
  <text x="100" y="856" font-size="11" fill="#333" font-weight="600">Weight: 5g</text>
  <text x="450" y="805" font-size="11" fill="#333" font-weight="600">MCU: ESP32-S3-MINI-1</text>
  <text x="450" y="822" font-size="11" fill="#333" font-weight="600">Charging: USB-C 5V</text>
  <text x="450" y="839" font-size="11" fill="#333" font-weight="600">Connectivity: WiFi + BLE 5.0</text>
  <text x="450" y="856" font-size="11" fill="#333" font-weight="600">BOM: ~$8 USD</text>
</svg>
