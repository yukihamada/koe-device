<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="studioBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="20%" stop-color="#222"/>
      <stop offset="80%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="studioChrome2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aaa"/>
      <stop offset="30%" stop-color="#ddd"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#aaa"/>
    </linearGradient>
    <linearGradient id="speakerCone" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="speakerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="40%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grillePat" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#1a1a1a"/>
    </pattern>
    <pattern id="meshPat" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#222"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="950" fill="#f5f5f0"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#111" letter-spacing="8">KOE STUDIO</text>
  <text x="400" y="70" text-anchor="middle" font-size="13" fill="#888" letter-spacing="3">HIGH-FIDELITY AI VOICE COMPANION</text>
  <text x="400" y="90" text-anchor="middle" font-size="11" fill="#aaa">50 x 70 x 20mm / 65g — Full-range speaker with passive radiator</text>

  <!-- ============ FRONT VIEW ============ -->
  <text x="250" y="130" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">FRONT</text>

  <!-- Main body - rounded rectangle, pebble-like -->
  <rect x="130" y="145" width="240" height="360" rx="40" ry="40" fill="url(#studioBody)" filter="url(#shadow3)"/>
  <!-- Chrome bezel -->
  <rect x="128" y="143" width="244" height="364" rx="42" ry="42" fill="none" stroke="url(#studioChrome2)" stroke-width="1.5"/>

  <!-- Top surface highlight -->
  <ellipse cx="250" cy="175" rx="80" ry="12" fill="#2a2a2a" opacity="0.3"/>

  <!-- Dual mic (wide spacing for beamforming) -->
  <circle cx="200" cy="185" r="5" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <circle cx="200" cy="185" r="6" fill="url(#meshPat)" opacity="0.5"/>
  <circle cx="300" cy="185" r="5" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <circle cx="300" cy="185" r="6" fill="url(#meshPat)" opacity="0.5"/>

  <!-- Mic spacing annotation -->
  <line x1="200" y1="175" x2="300" y2="175" stroke="#c66" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="250" y="172" text-anchor="middle" font-size="8" fill="#c66">40mm (wide stereo)</text>

  <!-- Main speaker grille - large circle -->
  <circle cx="250" cy="310" r="55" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>
  <circle cx="250" cy="310" r="53" fill="url(#grillePat)"/>
  <!-- Speaker cone center -->
  <circle cx="250" cy="310" r="20" fill="url(#speakerGrad)"/>
  <circle cx="250" cy="310" r="8" fill="#252525" stroke="#333" stroke-width="0.3"/>
  <!-- Speaker ring details -->
  <circle cx="250" cy="310" r="45" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="250" cy="310" r="35" fill="none" stroke="#1d1d1d" stroke-width="0.3"/>

  <!-- Speaker label -->
  <text x="250" y="380" text-anchor="middle" font-size="8" fill="#444">28mm FULL RANGE</text>

  <!-- LED strip (bottom of speaker) -->
  <rect x="215" y="395" width="70" height="6" rx="3" fill="#111" stroke="#333" stroke-width="0.3"/>
  <circle cx="225" cy="398" r="2" fill="#0f0" opacity="0.4"/>
  <circle cx="237" cy="398" r="2.2" fill="#0f0" opacity="0.6"/>
  <circle cx="250" cy="398" r="2.5" fill="#0f0" opacity="1" filter="url(#glow2)"/>
  <circle cx="263" cy="398" r="2.2" fill="#0f0" opacity="0.6"/>
  <circle cx="275" cy="398" r="2" fill="#0f0" opacity="0.4"/>

  <!-- Bottom area: Button + USB-C -->
  <!-- Button -->
  <circle cx="230" cy="460" r="8" fill="#252525" stroke="#444" stroke-width="1"/>
  <circle cx="230" cy="460" r="6" fill="#1a1a1a"/>
  <!-- USB-C -->
  <rect x="258" y="455" width="18" height="6" rx="3" fill="#0a0a0a" stroke="#333" stroke-width="0.5"/>

  <!-- Labels -->
  <text x="230" y="480" text-anchor="middle" font-size="8" fill="#555">Button</text>
  <text x="268" y="480" text-anchor="middle" font-size="8" fill="#555">USB-C</text>

  <!-- ============ SIDE VIEW ============ -->
  <text x="580" y="130" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">SIDE</text>

  <!-- Side profile - 20mm thick, tapered -->
  <path d="M530,170 Q525,165 525,180 L525,470 Q525,495 540,500 L590,500 Q605,495 605,470 L605,180 Q605,165 600,170 Z" fill="url(#studioBody)" filter="url(#shadow3)"/>
  <path d="M530,170 Q525,165 525,180 L525,470 Q525,495 540,500 L590,500 Q605,495 605,470 L605,180 Q605,165 600,170 Z" fill="none" stroke="#444" stroke-width="0.8"/>

  <!-- Speaker bump on front (left side of side view) -->
  <path d="M525,260 Q520,265 518,310 Q520,355 525,360" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>

  <!-- Passive radiator on back (right side) -->
  <path d="M605,280 Q610,285 612,310 Q610,335 605,340" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <text x="625" y="314" font-size="7" fill="#888">Passive</text>
  <text x="625" y="323" font-size="7" fill="#888">Radiator</text>

  <!-- Internal cross-section hint -->
  <text x="565" y="220" text-anchor="middle" font-size="7" fill="#555">PCB</text>
  <line x1="535" y1="225" x2="595" y2="225" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="565" y="310" text-anchor="middle" font-size="7" fill="#555">Sealed</text>
  <text x="565" y="319" text-anchor="middle" font-size="7" fill="#555">Chamber</text>
  <text x="565" y="420" text-anchor="middle" font-size="7" fill="#555">Battery</text>
  <text x="565" y="429" text-anchor="middle" font-size="7" fill="#555">2000mAh</text>

  <!-- Dimensions -->
  <line x1="515" y1="170" x2="505" y2="170" stroke="#c66" stroke-width="0.5"/>
  <line x1="515" y1="500" x2="505" y2="500" stroke="#c66" stroke-width="0.5"/>
  <line x1="510" y1="170" x2="510" y2="500" stroke="#c66" stroke-width="0.5"/>
  <text x="500" y="340" text-anchor="middle" font-size="10" fill="#c66" transform="rotate(-90, 500, 340)">70mm</text>

  <line x1="518" y1="510" x2="518" y2="520" stroke="#c66" stroke-width="0.5"/>
  <line x1="612" y1="510" x2="612" y2="520" stroke="#c66" stroke-width="0.5"/>
  <line x1="518" y1="515" x2="612" y2="515" stroke="#c66" stroke-width="0.5"/>
  <text x="565" y="530" text-anchor="middle" font-size="10" fill="#c66">20mm</text>

  <!-- ============ ACOUSTIC DESIGN ============ -->
  <text x="400" y="570" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">ACOUSTIC ARCHITECTURE</text>

  <!-- Cross-section diagram -->
  <rect x="150" y="590" width="500" height="180" rx="8" fill="#fafafa" stroke="#ddd"/>

  <!-- Front face -->
  <rect x="170" y="600" width="15" height="160" rx="4" fill="#333"/>
  <text x="177" y="680" text-anchor="middle" font-size="7" fill="#aaa" transform="rotate(-90, 177, 680)">FRONT</text>

  <!-- Speaker driver -->
  <g transform="translate(190, 630)">
    <rect x="0" y="0" width="60" height="50" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
    <text x="30" y="20" text-anchor="middle" font-size="9" fill="#aaa">28mm</text>
    <text x="30" y="32" text-anchor="middle" font-size="9" fill="#aaa">Driver</text>
    <text x="30" y="44" text-anchor="middle" font-size="8" fill="#666">4ohm 3W</text>
    <!-- Sound waves -->
    <path d="M-10,25 Q-20,15 -10,5" fill="none" stroke="#0af" stroke-width="1" opacity="0.5"/>
    <path d="M-20,30 Q-35,15 -20,0" fill="none" stroke="#0af" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Sealed chamber -->
  <rect x="260" y="615" width="180" height="80" fill="#f0f0f0" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="350" y="650" text-anchor="middle" font-size="11" fill="#888">Sealed Air Chamber</text>
  <text x="350" y="668" text-anchor="middle" font-size="9" fill="#aaa">Internal volume: ~15cm3</text>
  <text x="350" y="682" text-anchor="middle" font-size="9" fill="#aaa">Resonant freq: ~120Hz</text>

  <!-- Passive radiator -->
  <g transform="translate(450, 630)">
    <rect x="0" y="0" width="60" height="50" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
    <text x="30" y="20" text-anchor="middle" font-size="9" fill="#aaa">Passive</text>
    <text x="30" y="32" text-anchor="middle" font-size="9" fill="#aaa">Radiator</text>
    <text x="30" y="44" text-anchor="middle" font-size="8" fill="#666">25mm</text>
    <!-- Sound waves (back) -->
    <path d="M70,25 Q80,15 70,5" fill="none" stroke="#f80" stroke-width="1" opacity="0.5"/>
    <path d="M80,30 Q95,15 80,0" fill="none" stroke="#f80" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Back face -->
  <rect x="520" y="600" width="15" height="160" rx="4" fill="#333"/>
  <text x="527" y="680" text-anchor="middle" font-size="7" fill="#aaa" transform="rotate(-90, 527, 680)">BACK</text>

  <!-- PCB -->
  <rect x="260" y="700" width="180" height="15" fill="#2a7a2a" stroke="#1a5a1a" stroke-width="0.5"/>
  <text x="350" y="710" text-anchor="middle" font-size="7" fill="#fff">PCB — ESP32-S3 + MAX98357A</text>

  <!-- Battery -->
  <rect x="260" y="720" width="180" height="30" rx="4" fill="#445" stroke="#556" stroke-width="0.5"/>
  <text x="350" y="740" text-anchor="middle" font-size="9" fill="#aab">LiPo 2000mAh — 24h recording</text>

  <!-- Frequency response annotation -->
  <text x="177" y="775" font-size="9" fill="#0af">60Hz</text>
  <text x="240" y="775" font-size="9" fill="#888">—</text>
  <text x="260" y="775" font-size="9" fill="#888">Flat response</text>
  <text x="360" y="775" font-size="9" fill="#888">—</text>
  <text x="400" y="775" font-size="9" fill="#f80">20kHz</text>
  <text x="500" y="775" font-size="9" fill="#888">85dB @ 1m</text>

  <!-- ============ USE CASES ============ -->
  <text x="400" y="815" text-anchor="middle" font-size="12" fill="#666" letter-spacing="2">USE CASES</text>

  <!-- Desk stand -->
  <g transform="translate(80, 830)">
    <rect x="20" y="50" width="100" height="5" rx="2" fill="#ccc"/> <!-- desk surface -->
    <rect x="50" y="5" width="40" height="50" rx="8" fill="url(#studioBody)" stroke="#444" stroke-width="0.5"/>
    <circle cx="70" cy="30" r="10" fill="#111" stroke="#222" stroke-width="0.3"/>
    <circle cx="70" cy="30" r="4" fill="#1a1a1a"/>
    <rect x="60" y="44" width="20" height="2" rx="1" fill="#111"/>
    <circle cx="67" cy="45" r="0.8" fill="#0f0"/>
    <circle cx="70" cy="45" r="1" fill="#0f0"/>
    <circle cx="73" cy="45" r="0.8" fill="#0f0"/>
    <text x="70" y="75" text-anchor="middle" font-size="9" fill="#888">Desk / Meeting</text>
  </g>

  <!-- Belt clip -->
  <g transform="translate(280, 830)">
    <rect x="30" y="15" width="80" height="45" rx="3" fill="#886644"/> <!-- belt -->
    <rect x="50" y="5" width="40" height="50" rx="8" fill="url(#studioBody)" stroke="#444" stroke-width="0.5"/>
    <circle cx="70" cy="30" r="10" fill="#111"/>
    <rect x="45" y="0" width="50" height="8" rx="2" fill="#333" stroke="#555" stroke-width="0.5"/> <!-- clip -->
    <text x="70" y="75" text-anchor="middle" font-size="9" fill="#888">Belt Clip</text>
  </g>

  <!-- Lanyard -->
  <g transform="translate(480, 830)">
    <path d="M70,0 Q72,5 70,15" stroke="#666" stroke-width="1.5" fill="none"/>
    <rect x="50" y="15" width="40" height="50" rx="8" fill="url(#studioBody)" stroke="#444" stroke-width="0.5"/>
    <circle cx="70" cy="38" r="10" fill="#111"/>
    <circle cx="70" cy="38" r="4" fill="#1a1a1a"/>
    <text x="70" y="80" text-anchor="middle" font-size="9" fill="#888">Lanyard / Neck</text>
  </g>

  <!-- ============ SPECS BAR ============ -->
  <rect x="50" y="910" width="700" height="30" rx="6" fill="#f0f0ed" stroke="#ddd"/>
  <text x="100" y="930" font-size="10" fill="#333" font-weight="600">28mm driver | Passive radiator | 2000mAh / 24h | AEC echo cancel | DSP EQ | 85dB@1m | BOM ~$22</text>
</svg>
