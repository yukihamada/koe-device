app = "koe-live"
primary_region = "nrt"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "koe_data"
  destination = "/data"

[[services]]
  protocol = "udp"
  internal_port = 4443
  [[services.ports]]
    port = 4443

[[vm]]
  size = "shared-cpu-2x"
  memory = "512mb"
