# ============================================================
# Koe Stone — nRF5340 Zephyr project config
# Auracast (BLE Audio LE / BAP Broadcast Source) + I2S speaker
# ============================================================

# --- Bluetooth core ---
CONFIG_BT=y
CONFIG_BT_AUDIO=y
CONFIG_BT_BAP_BROADCAST_SOURCE=y
CONFIG_BT_ISO_BROADCASTER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV=y
CONFIG_BT_LE_AUDIO_TX_ISO_BUF_COUNT=2

# --- LC3 codec ---
CONFIG_LC3=y

# --- I2S (speaker output via nRFX driver) ---
CONFIG_I2S=y
CONFIG_I2S_NRFX=y

# --- Non-Volatile Storage (device serial, config) ---
CONFIG_NVS=y
CONFIG_NVS_SECTOR_COUNT=4

# --- GPIO (LED + tap button) ---
CONFIG_GPIO=y

# --- RTC2 for low-power timekeeping ---
CONFIG_NRFX_RTC2=y

# --- BLE device name ---
CONFIG_BT_DEVICE_NAME="Koe Stone"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

# --- Printf float support (LED brightness math) ---
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- FPU (Cortex-M33 has hardware FPU) ---
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- Memory pools ---
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192
