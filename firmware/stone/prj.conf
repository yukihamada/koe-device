# ============================================================
# Koe Stone — nRF5340 Zephyr project config
# Auracast (BLE Audio LE / BAP Broadcast Source) + I2S speaker
# ============================================================

# --- Bluetooth core ---
CONFIG_BT=y
CONFIG_BT_AUDIO=y
CONFIG_BT_BAP_BROADCAST_SOURCE=y
CONFIG_BT_ISO_BROADCASTER=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_PER_ADV=y
CONFIG_BT_ISO_TX_BUF_COUNT=6
CONFIG_BT_ISO_MAX_CHAN=2
CONFIG_BT_BAP_BROADCAST_SRC_STREAM_COUNT=2
CONFIG_BT_BAP_BROADCAST_SRC_SUBGROUP_COUNT=1

# --- LC3 codec (liblc3 / Google Android open-source) ---
CONFIG_LIBLC3=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# --- I2S (speaker output via nRFX driver) ---
CONFIG_I2S=y
CONFIG_I2S_NRFX=y

# --- Flash + Non-Volatile Storage (device serial, config) ---
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y

# --- GPIO (LED + tap button) ---
CONFIG_GPIO=y

# --- BLE device name ---
CONFIG_BT_DEVICE_NAME="Koe Stone"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

# --- Printf float support (LED brightness math) ---
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- Reboot support ---
CONFIG_REBOOT=y

# --- Memory pools ---
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192
