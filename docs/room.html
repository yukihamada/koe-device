<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koe · Sessions</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#05050a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #05050a;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
}

canvas { position: fixed; inset: 0; pointer-events: none; }

.logo {
    font-size: 0.8rem; font-weight: 200; letter-spacing: 0.45em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
}

.ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
}

.ring-wrap {
    position: relative;
    width: 240px; height: 240px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(139,92,246,0.12);
    width: 100%; height: 100%;
    animation: expand 4s ease-out infinite;
}
.ring:nth-child(2) { animation-delay: 1.33s; }
.ring:nth-child(3) { animation-delay: 2.66s; }
@keyframes expand {
    0%   { transform: scale(0.25); opacity: 0.9; border-color: rgba(139,92,246,0.5); }
    100% { transform: scale(2);    opacity: 0;   border-color: rgba(139,92,246,0); }
}
.dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #8B5CF6;
    box-shadow: 0 0 18px rgba(139,92,246,0.9), 0 0 50px rgba(139,92,246,0.3);
    animation: dotPulse 3s ease-in-out infinite;
    z-index: 1;
}
@keyframes dotPulse {
    0%,100% { transform: scale(1);   box-shadow: 0 0 18px rgba(139,92,246,0.9), 0 0 50px rgba(139,92,246,0.3); }
    50%     { transform: scale(1.4); box-shadow: 0 0 28px rgba(139,92,246,1),   0 0 80px rgba(139,92,246,0.5); }
}

.status { text-align: center; margin-top: 2.5rem; }
.badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: #8B5CF6; margin-bottom: 1.2rem;
    animation: fadePulse 3s ease-in-out infinite;
}
.badge .blink {
    width: 5px; height: 5px; border-radius: 50%;
    background: #8B5CF6;
    animation: blinkDot 1s ease-in-out infinite;
}
@keyframes blinkDot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
@keyframes fadePulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }

.main-text {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 100; letter-spacing: -0.04em;
    color: rgba(255,255,255,0.92); line-height: 1.1;
    margin-bottom: 1.2rem;
}
.sub-text {
    font-size: 0.85rem; font-weight: 200;
    color: rgba(255,255,255,0.32); letter-spacing: 0.02em;
    line-height: 1.7;
}

/* Waveform — shown when recording */
.waveform {
    display: flex; align-items: center; gap: 3px;
    height: 44px; margin-top: 2rem;
    opacity: 0; transition: opacity 1s;
}
.waveform.on { opacity: 1; }
.bar {
    width: 3px; border-radius: 2px;
    background: rgba(139,92,246,0.65);
    animation: wv 1.1s ease-in-out infinite;
}
.bar:nth-child(odd)  { animation-direction: alternate; }
.bar:nth-child(even) { animation-direction: alternate-reverse; }
@keyframes wv { 0%{transform:scaleY(0.2);} 100%{transform:scaleY(1);} }
.bar:nth-child(1)  { height:10px; animation-delay:0s;    }
.bar:nth-child(2)  { height:24px; animation-delay:0.08s; }
.bar:nth-child(3)  { height:38px; animation-delay:0.16s; }
.bar:nth-child(4)  { height:28px; animation-delay:0.05s; }
.bar:nth-child(5)  { height:16px; animation-delay:0.24s; }
.bar:nth-child(6)  { height:34px; animation-delay:0.12s; }
.bar:nth-child(7)  { height:42px; animation-delay:0.2s;  }
.bar:nth-child(8)  { height:22px; animation-delay:0.04s; }
.bar:nth-child(9)  { height:12px; animation-delay:0.28s; }
.bar:nth-child(10) { height:32px; animation-delay:0.16s; }
.bar:nth-child(11) { height:20px; animation-delay:0.08s; }
.bar:nth-child(12) { height:8px;  animation-delay:0.22s; }

/* bottom device row */
.bottom {
    position: fixed; bottom: 2.5rem;
    left: 50%; transform: translateX(-50%);
    text-align: center;
}
.device-row {
    display: flex; gap: 0.45rem; justify-content: center; margin-bottom: 0.5rem;
}
.dev {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(139,92,246,0.25);
}
.dev.on {
    background: rgba(139,92,246,0.7);
    box-shadow: 0 0 6px rgba(139,92,246,0.6);
    animation: devPulse 2s ease-in-out infinite;
}
@keyframes devPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
.bottom-label {
    font-size: 0.58rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15); text-transform: uppercase;
}

/* ── Voice indicator (top-left) ── */
.voice-pill {
    position: fixed; top: 1.8rem; left: 2rem;
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.85rem 0.4rem 0.65rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    transition: all 0.3s;
}
.voice-pill.active {
    background: rgba(139,92,246,0.1);
    border-color: rgba(139,92,246,0.3);
    color: #8B5CF6;
}
.voice-pill.heard {
    background: rgba(139,92,246,0.22);
    border-color: rgba(139,92,246,0.7);
    color: #fff;
    box-shadow: 0 0 20px rgba(139,92,246,0.25);
}
.voice-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
    flex-shrink: 0;
}
.voice-pill.active .voice-dot {
    background: #8B5CF6;
    animation: blinkDot 1.2s ease-in-out infinite;
}
.voice-pill.heard .voice-dot {
    background: #fff;
    animation: none;
    box-shadow: 0 0 8px #fff;
}

/* ── Keyboard hint (bottom-right) ── */
.kb-hint {
    position: fixed; bottom: 2.2rem; right: 2rem;
    display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem;
    opacity: 0; transition: opacity 0.4s;
}
.kb-hint.show { opacity: 1; }
.kb-row {
    display: flex; align-items: center; gap: 0.5rem;
}
.kb-key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.52rem; color: rgba(255,255,255,0.4);
    letter-spacing: 0;
}
.kb-label {
    font-size: 0.52rem; color: rgba(255,255,255,0.18);
    letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── Toast ── */
.toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.88);
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.4);
    backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 0.7rem 1.6rem;
    font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: #fff; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
}
.toast.show {
    opacity: 1; transform: translate(-50%, -50%) scale(1);
}

/* ── Wake flash overlay ── */
.wake-flash {
    position: fixed; inset: 0;
    background: rgba(139,92,246,0.08);
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s;
    z-index: 90;
}
.wake-flash.on { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="logo">KOE</div>

<!-- Voice indicator -->
<div class="voice-pill" id="voicePill">
    <div class="voice-dot"></div>
    <span id="voiceLabel">Voice</span>
</div>

<!-- Keyboard hint (shows on first keydown) -->
<div class="kb-hint" id="kbHint">
    <div class="kb-row">
        <span class="kb-key">Enter</span><span class="kb-label">Record</span>
    </div>
    <div class="kb-row">
        <span class="kb-key">Space</span><span class="kb-label">Toggle</span>
    </div>
    <div class="kb-row">
        <span class="kb-key">Esc</span><span class="kb-label">Stop</span>
    </div>
    <div class="kb-row">
        <span class="kb-key">↑↓</span><span class="kb-label">Volume</span>
    </div>
</div>

<!-- Wake flash -->
<div class="wake-flash" id="wakeFlash"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="ui">
    <div class="ring-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="dot"></div>
    </div>

    <div class="status">
        <div class="badge" id="badge">
            <span class="blink"></span>
            <span id="badge-txt">Sessions · Ready</span>
        </div>
        <div class="main-text" id="main">Start playing.<br>We're listening.</div>
        <div class="sub-text" id="sub">Pick up an instrument.<br>The house begins recording automatically.</div>
        <div class="waveform" id="wave">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>
</div>

<div class="bottom">
    <div class="device-row">
        <div class="dev on"></div><div class="dev on"></div>
        <div class="dev"></div><div class="dev"></div><div class="dev"></div>
    </div>
    <div class="bottom-label" id="dev-label">2 of 5 devices active</div>
</div>

<script>
// ── Ambient particle field ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 50; i++) pts.push({
    x: Math.random() * 1000, y: Math.random() * 800,
    vx: (Math.random() - 0.5) * 0.15,
    vy: -Math.random() * 0.25 - 0.05,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * 0.3 + 0.05
});

(function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(139,92,246,${p.a})`;
        ctx.fill();
    }
    requestAnimationFrame(frame);
})();

// ── State ───────────────────────────────────────────────────────────────────
let state = 'ready';
// volume: 0–100
let volume = 70;

function setReady() {
    state = 'ready';
    document.getElementById('badge-txt').textContent = 'Sessions · Ready';
    document.getElementById('main').innerHTML = 'Start playing.<br>We\'re listening.';
    document.getElementById('sub').textContent = 'Pick up an instrument. The house begins recording automatically.';
    document.getElementById('wave').classList.remove('on');
}

function setRecording(tracks) {
    state = 'recording';
    const t = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('badge-txt').textContent = '● Recording · ' + t;
    document.getElementById('main').innerHTML = 'Session in progress.';
    document.getElementById('sub').textContent = (tracks || 6) + ' tracks · 48 kHz / 24 bit · local only';
    document.getElementById('wave').classList.add('on');
}

function toggle() { state === 'ready' ? setRecording(6) : setReady(); }

// ── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Wake flash ──────────────────────────────────────────────────────────────
function wakeFlash() {
    const el = document.getElementById('wakeFlash');
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 300);
}

// ── Volume display ──────────────────────────────────────────────────────────
function changeVolume(delta) {
    volume = Math.max(0, Math.min(100, volume + delta));
    showToast('Volume  ' + volume + '%');
}

// ── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    // Show KB hint on first key
    document.getElementById('kbHint').classList.add('show');

    switch (e.key) {
        case 'Enter':
            e.preventDefault();
            if (state === 'ready') { setRecording(6); showToast('Recording started'); }
            break;
        case ' ':
            e.preventDefault();
            toggle();
            showToast(state === 'recording' ? 'Recording started' : 'Session stopped');
            break;
        case 'Escape':
        case 'Backspace':
            e.preventDefault();
            if (state === 'recording') { setReady(); showToast('Session stopped'); }
            break;
        case 'r':
        case 'R':
            toggle();
            break;
        case 'ArrowUp':
            e.preventDefault();
            changeVolume(+5);
            break;
        case 'ArrowDown':
            e.preventDefault();
            changeVolume(-5);
            break;
    }
});

// Tap / click anywhere
document.addEventListener('click', () => {
    toggle();
});

// ── Live state polling (/api/v1/room/state every 3s) ────────────────────────
let lastSessionId = null;
let liveOverride  = false; // true = manually toggled, don't auto-flip

async function pollRoomState() {
    try {
        const res = await fetch('/api/v1/room/state', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();

        // ── Device dots ──────────────────────────────────────────────────────
        const active = data.active_devices || 0;
        const total  = data.total_devices  || 5;
        const row    = document.querySelector('.device-row');
        const label  = document.getElementById('dev-label');
        if (row) {
            row.innerHTML = '';
            for (let i = 0; i < Math.min(total, 10); i++) {
                const d = document.createElement('div');
                d.className = 'dev' + (i < active ? ' on' : '');
                row.appendChild(d);
            }
        }
        if (label) label.textContent = active + ' of ' + total + ' devices active';

        // ── Active session → auto recording state ────────────────────────────
        if (!liveOverride) {
            if (data.active_session && data.active_session.id !== lastSessionId) {
                const s = data.active_session;
                lastSessionId = s.id;
                // Switch to recording without toggle() to avoid user confusion
                state = 'recording';
                const t = new Date(s.start_time * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('badge-txt').textContent = '● Recording · ' + t;
                document.getElementById('main').innerHTML = 'Session in progress.';
                const instr = (() => {
                    try { const a = JSON.parse(s.instruments); return a.length ? a.join(', ') : null; } catch { return null; }
                })();
                document.getElementById('sub').textContent =
                    s.tracks + ' tracks · ' + (instr || '48 kHz / 24 bit') + ' · local only';
                document.getElementById('wave').classList.add('on');
            } else if (!data.active_session && lastSessionId && state === 'recording') {
                // Session ended remotely
                lastSessionId = null;
                setReady();
            }
        }

        // ── Morning Mix badge (sessions_today) ──────────────────────────────
        if (data.sessions_today > 0 && state === 'ready') {
            const badge = document.getElementById('badge-txt');
            if (!badge.textContent.includes('session')) {
                badge.textContent = 'Sessions · ' + data.sessions_today + ' today';
            }
        }

    } catch (_) { /* network error — silent */ }
}

// Start polling immediately then every 3 seconds
pollRoomState();
setInterval(pollRoomState, 3000);

// ── Web Speech API — wake word ───────────────────────────────────────────────
const pill   = document.getElementById('voicePill');
const vLabel = document.getElementById('voiceLabel');

// Wake phrases (EN + JA)
const WAKE    = ['hey koe', 'ヘイコエ', 'ヘイ声', 'hey ko', 'hey ko e', 'koe'];
const START   = ['record', 'start', 'begin', '録音', '始めて', 'start recording', 'rec'];
const STOP    = ['stop', 'done', 'finish', 'end', 'pause', '止めて', '停止', 'stop recording'];
const VOL_UP  = ['volume up', 'louder', '音量上げて', 'up'];
const VOL_DN  = ['volume down', 'quieter', '音量下げて', 'down'];

let SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let wakeActive = false; // two-step: wake word first, then command

if (SpeechRec) {
    const rec = new SpeechRec();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'ja-JP'; // recognizes both JP and EN

    pill.classList.add('active');
    vLabel.textContent = 'Listening';

    rec.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript.toLowerCase().trim();
            if (e.results[i].isFinal) {
                handleCommand(t);
            } else {
                interim = t;
            }
        }
        // Show interim faintly in label
        if (interim.length > 0 && interim.length < 20) {
            vLabel.textContent = interim;
        }
    };

    rec.onend = () => {
        // Restart continuously
        try { rec.start(); } catch (_) {}
        pill.classList.add('active');
        pill.classList.remove('heard');
        vLabel.textContent = 'Listening';
    };

    rec.onerror = e => {
        if (e.error === 'not-allowed') {
            pill.classList.remove('active');
            vLabel.textContent = 'Mic off';
        }
    };

    try { rec.start(); } catch (_) {}

    function handleCommand(text) {
        const match = s => s.some(p => text.includes(p));

        if (match(WAKE)) {
            // Wake word detected
            wakeActive = true;
            pill.classList.add('heard');
            vLabel.textContent = 'Hey Koe';
            wakeFlash();
            showToast('Hey Koe — say "Record" or "Stop"');
            setTimeout(() => {
                pill.classList.remove('heard');
                vLabel.textContent = 'Listening';
                wakeActive = false;
            }, 5000);
            return;
        }

        // After wake OR direct command when recording-aware
        if (match(START)) {
            if (state === 'ready') {
                setRecording(6);
                wakeFlash();
                showToast('Recording started');
            }
            wakeActive = false;
        } else if (match(STOP)) {
            if (state === 'recording') {
                setReady();
                wakeFlash();
                showToast('Session stopped');
            }
            wakeActive = false;
        } else if (match(VOL_UP)) {
            changeVolume(+10);
            wakeActive = false;
        } else if (match(VOL_DN)) {
            changeVolume(-10);
            wakeActive = false;
        } else if (wakeActive) {
            // Wake active but unrecognized — reset after timeout (already scheduled)
        }

        pill.classList.remove('heard');
        vLabel.textContent = 'Listening';
    }

} else {
    // Browser doesn't support Speech API
    vLabel.textContent = 'No mic API';
}
</script>
</body>
</html>
