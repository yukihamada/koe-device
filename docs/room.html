<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koe · Room</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#05050a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #05050a;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
}

canvas { position: fixed; inset: 0; pointer-events: none; }

/* ── Logo ── */
.logo {
    font-size: 0.8rem; font-weight: 200; letter-spacing: 0.45em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 10;
}

/* ── WS status dot (top-right) ── */
.ws-indicator {
    position: fixed; top: 1.9rem; right: 2rem;
    display: flex; align-items: center; gap: 0.4rem;
    z-index: 20;
}
.ws-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s, box-shadow 0.4s;
}
.ws-dot.connected {
    background: #22c55e;
    box-shadow: 0 0 8px rgba(34,197,94,0.7);
}
.ws-dot.reconnecting {
    background: rgba(255,255,255,0.25);
    animation: wsBlink 0.9s ease-in-out infinite;
}
@keyframes wsBlink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }
.ws-label {
    font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    transition: color 0.4s;
}
.ws-dot.connected + .ws-label { color: rgba(34,197,94,0.6); }

/* ── Main layout ── */
.ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    z-index: 5;
}

/* ── Session timer ── */
.session-timer {
    font-size: clamp(3.5rem, 9vw, 6rem);
    font-weight: 100; letter-spacing: -0.04em;
    color: rgba(255,255,255,0.95);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.6s;
    margin-bottom: 0.5rem;
}
.session-timer.recording {
    color: #a78bfa;
    text-shadow: 0 0 40px rgba(167,139,250,0.4);
}

/* ── Waveform sweep bar ── */
.sweep-wrap {
    width: min(680px, 88vw);
    margin: 1.4rem 0 1.2rem;
}
.sweep-bar {
    width: 100%; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.07);
    overflow: hidden;
    position: relative;
}
.sweep-fill {
    height: 100%; border-radius: 2px;
    background: rgba(255,255,255,0.2);
    width: 0%;
    transition: width 0.08s linear, background 0.4s;
    transform-origin: left;
}
.sweep-fill.recording {
    background: #8B5CF6;
    box-shadow: 0 0 12px rgba(139,92,246,0.6);
}

/* ── VU bars ── */
.vu-wrap {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 4px;
    height: 80px;
    width: min(680px, 88vw);
    margin-bottom: 1.6rem;
}
.vu-bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    background: rgba(139,92,246,0.18);
    height: 4px;
    transition: height 0.07s ease-out, background 0.4s;
    max-height: 80px;
}
.vu-bar.recording {
    background: linear-gradient(to top, #8B5CF6, #c084fc);
}

/* ── Status line ── */
.status-line {
    font-size: 0.78rem; font-weight: 300;
    color: rgba(255,255,255,0.35); letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.6;
    min-height: 1.4em;
    transition: color 0.4s;
}
.status-line.recording {
    color: rgba(167,139,250,0.7);
}

/* ── Badge ── */
.badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.58rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    margin-bottom: 1.2rem;
    transition: color 0.4s;
}
.badge.recording { color: #8B5CF6; }
.badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    opacity: 0;
    transition: opacity 0.3s;
}
.badge.recording .badge-dot {
    opacity: 1;
    animation: blinkDot 1s ease-in-out infinite;
}
@keyframes blinkDot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

/* ── Bottom device row ── */
.bottom {
    position: fixed; bottom: 2.5rem;
    left: 50%; transform: translateX(-50%);
    text-align: center;
    z-index: 10;
}
.device-row {
    display: flex; gap: 0.45rem; justify-content: center; margin-bottom: 0.5rem;
}
.dev {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(139,92,246,0.22);
}
.dev.on {
    background: rgba(139,92,246,0.7);
    box-shadow: 0 0 6px rgba(139,92,246,0.6);
    animation: devPulse 2s ease-in-out infinite;
}
@keyframes devPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
.bottom-label {
    font-size: 0.58rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15); text-transform: uppercase;
}

/* ── Voice pill (top-left) ── */
.voice-pill {
    position: fixed; top: 1.8rem; left: 2rem;
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.85rem 0.4rem 0.65rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    transition: all 0.3s;
    z-index: 20;
}
.voice-pill.active {
    background: rgba(139,92,246,0.1);
    border-color: rgba(139,92,246,0.3);
    color: #8B5CF6;
}
.voice-pill.heard {
    background: rgba(139,92,246,0.22);
    border-color: rgba(139,92,246,0.7);
    color: #fff;
    box-shadow: 0 0 20px rgba(139,92,246,0.25);
}
.voice-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s;
    flex-shrink: 0;
}
.voice-pill.active .voice-dot {
    background: #8B5CF6;
    animation: blinkDot 1.2s ease-in-out infinite;
}
.voice-pill.heard .voice-dot {
    background: #fff;
    animation: none;
    box-shadow: 0 0 8px #fff;
}

/* ── Keyboard hint (bottom-right) ── */
.kb-hint {
    position: fixed; bottom: 2.2rem; right: 2rem;
    display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem;
    opacity: 0; transition: opacity 0.4s;
    z-index: 10;
}
.kb-hint.show { opacity: 1; }
.kb-row { display: flex; align-items: center; gap: 0.5rem; }
.kb-key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.52rem; color: rgba(255,255,255,0.4);
}
.kb-label {
    font-size: 0.52rem; color: rgba(255,255,255,0.18);
    letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── Toast ── */
.toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.88);
    background: rgba(139,92,246,0.15);
    border: 1px solid rgba(139,92,246,0.4);
    backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 0.7rem 1.6rem;
    font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: #fff; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ── Wake flash overlay ── */
.wake-flash {
    position: fixed; inset: 0;
    background: rgba(139,92,246,0.08);
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s;
    z-index: 90;
}
.wake-flash.on { opacity: 1; }

/* ── Browser mic button ── */
.mic-btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.35);
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: all 0.25s;
    font-family: inherit; margin-top: 0.8rem;
}
.mic-btn:hover {
    background: rgba(139,92,246,0.1);
    border-color: rgba(139,92,246,0.35);
    color: rgba(167,139,250,0.9);
}
.mic-btn.active {
    background: rgba(139,92,246,0.15);
    border-color: rgba(139,92,246,0.5);
    color: #a78bfa;
    box-shadow: 0 0 20px rgba(139,92,246,0.15);
}
.mic-btn-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
}
.mic-btn.active .mic-btn-dot {
    animation: blinkDot 1s ease-in-out infinite;
}

/* ── Feature pills ── */
.features-row {
    display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;
    margin-top: 0.8rem; max-width: 320px; margin-left: auto; margin-right: auto;
    opacity: 0; transition: opacity 0.5s; pointer-events: none;
}
.features-row.show { opacity: 1; }
.feat-pill {
    font-size: 0.48rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    padding: 0.28rem 0.65rem; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.07);
}
</style>
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>

<canvas id="c"></canvas>
<div class="logo">KOE</div>

<!-- WS status indicator (top-right) -->
<div class="ws-indicator">
    <div class="ws-dot reconnecting" id="wsDot"></div>
    <span class="ws-label" id="wsLabel">—</span>
</div>

<!-- Voice pill (top-left) -->
<div class="voice-pill" id="voicePill">
    <div class="voice-dot"></div>
    <span id="voiceLabel">Voice</span>
</div>

<!-- Keyboard hint -->
<div class="kb-hint" id="kbHint">
    <div class="kb-row"><span class="kb-key">Enter</span><span class="kb-label">Record</span></div>
    <div class="kb-row"><span class="kb-key">Space</span><span class="kb-label">Toggle</span></div>
    <div class="kb-row"><span class="kb-key">Esc</span><span class="kb-label">Stop</span></div>
    <div class="kb-row"><span class="kb-key">↑↓</span><span class="kb-label">Volume</span></div>
</div>

<!-- Wake flash -->
<div class="wake-flash" id="wakeFlash"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="ui">
    <div class="badge" id="badge">
        <span class="badge-dot"></span>
        <span id="badge-txt">Sessions · Ready</span>
    </div>

    <!-- Large session timer -->
    <div class="session-timer" id="sessionTimer">—</div>

    <!-- Full-width sweep bar -->
    <div class="sweep-wrap">
        <div class="sweep-bar">
            <div class="sweep-fill" id="sweepFill"></div>
        </div>
    </div>

    <!-- VU level bars (12 bars) -->
    <div class="vu-wrap" id="vuWrap">
        <div class="vu-bar" id="b0"></div>
        <div class="vu-bar" id="b1"></div>
        <div class="vu-bar" id="b2"></div>
        <div class="vu-bar" id="b3"></div>
        <div class="vu-bar" id="b4"></div>
        <div class="vu-bar" id="b5"></div>
        <div class="vu-bar" id="b6"></div>
        <div class="vu-bar" id="b7"></div>
        <div class="vu-bar" id="b8"></div>
        <div class="vu-bar" id="b9"></div>
        <div class="vu-bar" id="b10"></div>
        <div class="vu-bar" id="b11"></div>
    </div>

    <!-- Status line -->
    <div class="status-line" id="statusLine">Ready · pick up an instrument</div>
</div>

<div class="bottom">
    <div class="device-row" id="deviceRow">
        <div class="dev on"></div><div class="dev on"></div>
        <div class="dev"></div><div class="dev"></div><div class="dev"></div>
    </div>
    <div class="bottom-label" id="dev-label">2 of 5 devices active</div>
    <button class="mic-btn" id="micBtn" onclick="event.stopPropagation(); toggleBrowserMic()">
        <span class="mic-btn-dot"></span>
        <span id="micLabel">Use mic</span>
    </button>
    <div class="features-row" id="featuresRow">
        <span class="feat-pill">Morning Mix</span>
        <span class="feat-pill">Auracast</span>
        <span class="feat-pill">Loop detect</span>
        <span class="feat-pill">0.3ms sync</span>
        <span class="feat-pill">Onset detect</span>
    </div>
</div>

<script>
// ── Ambient particle field ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const pts = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 50; i++) pts.push({
    x: Math.random() * 1000, y: Math.random() * 800,
    vx: (Math.random() - 0.5) * 0.15,
    vy: -Math.random() * 0.25 - 0.05,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * 0.3 + 0.05
});

(function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(139,92,246,${p.a})`;
        ctx.fill();
    }
    requestAnimationFrame(frame);
})();

// ── State ───────────────────────────────────────────────────────────────────
const NUM_BARS = 12;
let isRecording  = false;
let sessionStart = null;    // Date (wall clock) when session began
let sessionId    = null;
let volume       = 70;
let lastLevel    = 0.0;

// Per-bar variation seeds (randomized once, fixed per bar for organic look)
const barSeeds = Array.from({length: NUM_BARS}, () => 0.55 + Math.random() * 0.45);

// ── DOM refs ────────────────────────────────────────────────────────────────
const timerEl   = document.getElementById('sessionTimer');
const sweepFill = document.getElementById('sweepFill');
const statusEl  = document.getElementById('statusLine');
const badgeEl   = document.getElementById('badge');
const badgeTxt  = document.getElementById('badge-txt');
const vuBars    = Array.from({length: NUM_BARS}, (_, i) => document.getElementById('b' + i));

// ── Level update (called from WS or fallback poll) ──────────────────────────
function updateLevel(level, rec) {
    // Smooth the level slightly so it doesn't look jittery on the bar
    lastLevel = lastLevel * 0.4 + level * 0.6;

    // Sweep bar — full width proportional to level
    sweepFill.style.width = (lastLevel * 100).toFixed(1) + '%';

    // VU bars — each gets level × per-bar variation × some height randomness
    const baseHeight = Math.max(lastLevel, 0.02); // floor so bars are always visible
    for (let i = 0; i < NUM_BARS; i++) {
        // Add a little per-frame random flutter on top of the seed variation
        const flutter = 0.75 + Math.random() * 0.5;
        const h = Math.min(80, Math.max(3, baseHeight * barSeeds[i] * flutter * 80));
        vuBars[i].style.height = h.toFixed(1) + 'px';
    }

    if (rec !== isRecording) {
        setRecordingState(rec);
    }
}

// ── Recording state change ──────────────────────────────────────────────────
function setRecordingState(rec, startTime) {
    isRecording = rec;

    timerEl.classList.toggle('recording', rec);
    sweepFill.classList.toggle('recording', rec);
    statusEl.classList.toggle('recording', rec);
    badgeEl.classList.toggle('recording', rec);
    vuBars.forEach(b => b.classList.toggle('recording', rec));

    if (rec) {
        if (startTime) {
            sessionStart = new Date(startTime * 1000);
        } else if (!sessionStart) {
            sessionStart = new Date();
        }
        badgeTxt.textContent = '● Recording';
    } else {
        sessionStart = null;
        timerEl.textContent = '—';
        statusEl.textContent = 'Ready · pick up an instrument';
        badgeTxt.textContent = 'Sessions · Ready';
    }
}

// ── Session timer tick ──────────────────────────────────────────────────────
setInterval(() => {
    if (!isRecording || !sessionStart) return;
    const elapsed = Math.floor((Date.now() - sessionStart.getTime()) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');
    timerEl.textContent = mm + ':' + ss;
    // Update status line with elapsed time
    statusEl.textContent = 'Session in progress · ' + mm + ':' + ss;
}, 500);

// Idle bars decay slowly when not receiving live data
let lastWsMessage = 0;
setInterval(() => {
    if (Date.now() - lastWsMessage > 300) {
        // No WS data for 300ms — decay bars
        lastLevel *= 0.85;
        for (let i = 0; i < NUM_BARS; i++) {
            const h = Math.max(3, parseFloat(vuBars[i].style.height || '3') * 0.85);
            vuBars[i].style.height = h.toFixed(1) + 'px';
        }
        sweepFill.style.width = (lastLevel * 100).toFixed(1) + '%';
    }
}, 80);

// ── WebSocket live level feed ────────────────────────────────────────────────
const wsDot   = document.getElementById('wsDot');
const wsLabel = document.getElementById('wsLabel');
let ws        = null;
let wsRetry   = null;

function wsConnect() {
    if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '/ws/room');

    wsDot.className = 'ws-dot reconnecting';
    wsLabel.textContent = '…';

    ws.onopen = () => {
        wsDot.className = 'ws-dot connected';
        wsLabel.textContent = 'Live';
        clearTimeout(wsRetry);
    };

    ws.onmessage = (e) => {
        lastWsMessage = Date.now();
        try {
            const d = JSON.parse(e.data);
            // d.level = 0.0-1.0 audio RMS
            // d.is_recording = bool
            // d.device_id = string
            if (typeof d.level === 'number') {
                updateLevel(d.level, !!d.is_recording);
            }
        } catch (_) {}
    };

    ws.onclose = () => {
        wsDot.className = 'ws-dot reconnecting';
        wsLabel.textContent = '—';
        wsRetry = setTimeout(wsConnect, 3000);
    };

    ws.onerror = () => {
        ws.close();
    };
}

wsConnect();

// ── Poll /api/v1/room/state every 5s (fallback + device count) ───────────────
let lastSessionId = null;

async function pollRoomState() {
    try {
        const res = await fetch('/api/v1/room/state', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();

        // Device dots
        const active = data.active_devices || 0;
        const total  = data.total_devices  || 5;
        const row    = document.getElementById('deviceRow');
        const label  = document.getElementById('dev-label');
        if (row) {
            row.innerHTML = '';
            for (let i = 0; i < Math.min(total, 10); i++) {
                const d = document.createElement('div');
                d.className = 'dev' + (i < active ? ' on' : '');
                row.appendChild(d);
            }
        }
        if (label) label.textContent = active + ' of ' + total + ' devices active';

        // Session state (fallback when WS not available)
        if (data.active_session) {
            const s = data.active_session;
            if (s.id !== lastSessionId) {
                lastSessionId = s.id;
                sessionId = s.id;
                if (!isRecording) {
                    setRecordingState(true, s.start_time);
                } else if (!sessionStart && s.start_time) {
                    sessionStart = new Date(s.start_time * 1000);
                }
                // Update status with track count
                const tracks = s.tracks || 1;
                const elapsed = sessionStart
                    ? Math.floor((Date.now() - sessionStart.getTime()) / 1000)
                    : 0;
                const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const ss = String(elapsed % 60).padStart(2, '0');
                statusEl.textContent = 'Session in progress · ' + tracks + ' track' + (tracks !== 1 ? 's' : '') + ' · ' + mm + ':' + ss;
            }
        } else if (!data.active_session && lastSessionId && isRecording) {
            lastSessionId = null;
            sessionId = null;
            setRecordingState(false);
        }

        // Sessions today badge (idle state)
        if (data.sessions_today > 0 && !isRecording) {
            if (!badgeTxt.textContent.includes('session')) {
                badgeTxt.textContent = 'Sessions · ' + data.sessions_today + ' today';
            }
        }

    } catch (_) {}
}

pollRoomState();
setInterval(pollRoomState, 5000);

// ── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Wake flash ──────────────────────────────────────────────────────────────
function wakeFlash() {
    const el = document.getElementById('wakeFlash');
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 300);
}

// ── Volume ──────────────────────────────────────────────────────────────────
function changeVolume(delta) {
    volume = Math.max(0, Math.min(100, volume + delta));
    showToast('Volume  ' + volume + '%');
}

// ── Manual toggle (keyboard / click) ────────────────────────────────────────
function toggle() {
    if (isRecording) {
        setRecordingState(false);
        showToast('Session stopped');
    } else {
        setRecordingState(true);
        showToast('Recording started');
    }
}

// ── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    document.getElementById('kbHint').classList.add('show');

    switch (e.key) {
        case 'Enter':
            e.preventDefault();
            if (!isRecording) { setRecordingState(true); showToast('Recording started'); }
            break;
        case ' ':
            e.preventDefault();
            toggle();
            break;
        case 'Escape':
        case 'Backspace':
            e.preventDefault();
            if (isRecording) { setRecordingState(false); showToast('Session stopped'); }
            break;
        case 'r':
        case 'R':
            toggle();
            break;
        case 'ArrowUp':
            e.preventDefault();
            changeVolume(+5);
            break;
        case 'ArrowDown':
            e.preventDefault();
            changeVolume(-5);
            break;
    }
});

document.addEventListener('click', () => {
    toggle();
});

// ── Web Speech API — wake word ───────────────────────────────────────────────
const pill   = document.getElementById('voicePill');
const vLabel = document.getElementById('voiceLabel');

const WAKE   = ['hey koe', 'ヘイコエ', 'ヘイ声', 'hey ko', 'hey ko e', 'koe'];
const START  = ['record', 'start', 'begin', '録音', '始めて', 'start recording', 'rec'];
const STOP   = ['stop', 'done', 'finish', 'end', 'pause', '止めて', '停止', 'stop recording'];
const VOL_UP = ['volume up', 'louder', '音量上げて', 'up'];
const VOL_DN = ['volume down', 'quieter', '音量下げて', 'down'];

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let wakeActive = false;

if (SpeechRec) {
    const rec = new SpeechRec();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'ja-JP';

    pill.classList.add('active');
    vLabel.textContent = 'Listening';

    rec.onresult = e => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript.toLowerCase().trim();
            if (e.results[i].isFinal) {
                handleCommand(t);
            } else {
                interim = t;
            }
        }
        if (interim.length > 0 && interim.length < 20) {
            vLabel.textContent = interim;
        }
    };

    rec.onend = () => {
        try { rec.start(); } catch (_) {}
        pill.classList.add('active');
        pill.classList.remove('heard');
        vLabel.textContent = 'Listening';
    };

    rec.onerror = e => {
        if (e.error === 'not-allowed') {
            pill.classList.remove('active');
            vLabel.textContent = 'Mic off';
        }
    };

    try { rec.start(); } catch (_) {}

    function handleCommand(text) {
        const match = s => s.some(p => text.includes(p));

        if (match(WAKE)) {
            wakeActive = true;
            pill.classList.add('heard');
            vLabel.textContent = 'Hey Koe';
            wakeFlash();
            showToast('Hey Koe — say "Record" or "Stop"');
            setTimeout(() => {
                pill.classList.remove('heard');
                vLabel.textContent = 'Listening';
                wakeActive = false;
            }, 5000);
            return;
        }

        if (match(START)) {
            if (!isRecording) { setRecordingState(true); wakeFlash(); showToast('Recording started'); }
            wakeActive = false;
        } else if (match(STOP)) {
            if (isRecording) { setRecordingState(false); wakeFlash(); showToast('Session stopped'); }
            wakeActive = false;
        } else if (match(VOL_UP)) {
            changeVolume(+10); wakeActive = false;
        } else if (match(VOL_DN)) {
            changeVolume(-10); wakeActive = false;
        }

        pill.classList.remove('heard');
        vLabel.textContent = 'Listening';
    }

} else {
    vLabel.textContent = 'No mic API';
}

// ── Browser mic capture ─────────────────────────────────────────────────────
let browserMicActive = false;
let browserMicStream = null;
let browserMicInterval = null;

async function toggleBrowserMic() {
    if (browserMicActive) { stopBrowserMic(); return; }

    try {
        browserMicStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        const actx     = new AudioContext();
        const src      = actx.createMediaStreamSource(browserMicStream);
        const analyser = actx.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.55;
        src.connect(analyser);
        const buf = new Float32Array(analyser.frequencyBinCount);

        document.getElementById('micBtn').classList.add('active');
        document.getElementById('micLabel').textContent = 'Mic on';
        document.getElementById('featuresRow').classList.add('show');
        browserMicActive = true;
        showToast('Browser mic active');

        browserMicInterval = setInterval(() => {
            analyser.getFloatTimeDomainData(buf);
            let sum = 0;
            for (const s of buf) sum += s * s;
            const rms   = Math.sqrt(sum / buf.length);
            const level = Math.min(1.0, rms * 20); // scale: mic RMS ~0.001–0.05 → 0–1

            updateLevel(level, isRecording);
            lastWsMessage = Date.now(); // suppress idle decay while mic is active

            fetch('/api/v1/room/audio-level', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    device_id: 'browser-mic',
                    room:       'main',
                    level:      Math.round(level * 1000) / 1000,
                    is_recording: isRecording
                }),
                keepalive: true
            }).catch(() => {});
        }, 100);

    } catch (err) {
        showToast('Mic access denied');
    }
}

function stopBrowserMic() {
    clearInterval(browserMicInterval);
    browserMicInterval = null;
    if (browserMicStream) { browserMicStream.getTracks().forEach(t => t.stop()); browserMicStream = null; }
    browserMicActive = false;
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('micLabel').textContent = 'Use mic';
    showToast('Mic stopped');
}
</script>
