<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koe · Sessions</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#05050a">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #05050a;
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
}

canvas { position: fixed; inset: 0; pointer-events: none; }

.logo {
    font-size: 0.8rem; font-weight: 200; letter-spacing: 0.45em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
}

.ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
}

.ring-wrap {
    position: relative;
    width: 240px; height: 240px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(139,92,246,0.12);
    width: 100%; height: 100%;
    animation: expand 4s ease-out infinite;
}
.ring:nth-child(2) { animation-delay: 1.33s; }
.ring:nth-child(3) { animation-delay: 2.66s; }
@keyframes expand {
    0%   { transform: scale(0.25); opacity: 0.9; border-color: rgba(139,92,246,0.5); }
    100% { transform: scale(2);    opacity: 0;   border-color: rgba(139,92,246,0); }
}
.dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #8B5CF6;
    box-shadow: 0 0 18px rgba(139,92,246,0.9), 0 0 50px rgba(139,92,246,0.3);
    animation: dotPulse 3s ease-in-out infinite;
    z-index: 1;
}
@keyframes dotPulse {
    0%,100% { transform: scale(1);   box-shadow: 0 0 18px rgba(139,92,246,0.9), 0 0 50px rgba(139,92,246,0.3); }
    50%     { transform: scale(1.4); box-shadow: 0 0 28px rgba(139,92,246,1),   0 0 80px rgba(139,92,246,0.5); }
}

.status { text-align: center; margin-top: 2.5rem; }
.badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: #8B5CF6; margin-bottom: 1.2rem;
    animation: fadePulse 3s ease-in-out infinite;
}
.badge .blink {
    width: 5px; height: 5px; border-radius: 50%;
    background: #8B5CF6;
    animation: blinkDot 1s ease-in-out infinite;
}
@keyframes blinkDot { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
@keyframes fadePulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }

.main-text {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 100; letter-spacing: -0.04em;
    color: rgba(255,255,255,0.92); line-height: 1.1;
    margin-bottom: 1.2rem;
}
.sub-text {
    font-size: 0.85rem; font-weight: 200;
    color: rgba(255,255,255,0.32); letter-spacing: 0.02em;
    line-height: 1.7;
}

/* Waveform — shown when recording */
.waveform {
    display: flex; align-items: center; gap: 3px;
    height: 44px; margin-top: 2rem;
    opacity: 0; transition: opacity 1s;
}
.waveform.on { opacity: 1; }
.bar {
    width: 3px; border-radius: 2px;
    background: rgba(139,92,246,0.65);
    animation: wv 1.1s ease-in-out infinite;
}
.bar:nth-child(odd)  { animation-direction: alternate; }
.bar:nth-child(even) { animation-direction: alternate-reverse; }
@keyframes wv { 0%{transform:scaleY(0.2);} 100%{transform:scaleY(1);} }
.bar:nth-child(1)  { height:10px; animation-delay:0s;    }
.bar:nth-child(2)  { height:24px; animation-delay:0.08s; }
.bar:nth-child(3)  { height:38px; animation-delay:0.16s; }
.bar:nth-child(4)  { height:28px; animation-delay:0.05s; }
.bar:nth-child(5)  { height:16px; animation-delay:0.24s; }
.bar:nth-child(6)  { height:34px; animation-delay:0.12s; }
.bar:nth-child(7)  { height:42px; animation-delay:0.2s;  }
.bar:nth-child(8)  { height:22px; animation-delay:0.04s; }
.bar:nth-child(9)  { height:12px; animation-delay:0.28s; }
.bar:nth-child(10) { height:32px; animation-delay:0.16s; }
.bar:nth-child(11) { height:20px; animation-delay:0.08s; }
.bar:nth-child(12) { height:8px;  animation-delay:0.22s; }

/* bottom device row */
.bottom {
    position: fixed; bottom: 2.5rem;
    left: 50%; transform: translateX(-50%);
    text-align: center;
}
.device-row {
    display: flex; gap: 0.45rem; justify-content: center; margin-bottom: 0.5rem;
}
.dev {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(139,92,246,0.25);
}
.dev.on {
    background: rgba(139,92,246,0.7);
    box-shadow: 0 0 6px rgba(139,92,246,0.6);
    animation: devPulse 2s ease-in-out infinite;
}
@keyframes devPulse { 0%,100%{opacity:0.7;} 50%{opacity:1;} }
.bottom-label {
    font-size: 0.58rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.15); text-transform: uppercase;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="logo">KOE</div>

<div class="ui">
    <div class="ring-wrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="dot"></div>
    </div>

    <div class="status">
        <div class="badge" id="badge">
            <span class="blink"></span>
            <span id="badge-txt">Sessions · Ready</span>
        </div>
        <div class="main-text" id="main">Start playing.<br>We're listening.</div>
        <div class="sub-text" id="sub">Pick up an instrument.<br>The house begins recording automatically.</div>
        <div class="waveform" id="wave">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>
</div>

<div class="bottom">
    <div class="device-row">
        <div class="dev on"></div><div class="dev on"></div>
        <div class="dev"></div><div class="dev"></div><div class="dev"></div>
    </div>
    <div class="bottom-label" id="dev-label">2 of 5 devices active</div>
</div>

<script>
// Ambient particle field
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 50; i++) pts.push({
    x: Math.random() * 1000, y: Math.random() * 800,
    vx: (Math.random() - 0.5) * 0.15,
    vy: -Math.random() * 0.25 - 0.05,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * 0.3 + 0.05
});

(function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(139,92,246,${p.a})`;
        ctx.fill();
    }
    requestAnimationFrame(frame);
})();

// State
let state = 'ready';

function setReady() {
    state = 'ready';
    document.getElementById('badge-txt').textContent = 'Sessions · Ready';
    document.getElementById('main').innerHTML = 'Start playing.<br>We\'re listening.';
    document.getElementById('sub').textContent = 'Pick up an instrument. The house begins recording automatically.';
    document.getElementById('wave').classList.remove('on');
}

function setRecording(tracks) {
    state = 'recording';
    const t = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('badge-txt').textContent = '● Recording · ' + t;
    document.getElementById('main').innerHTML = 'Session in progress.';
    document.getElementById('sub').textContent = (tracks || 6) + ' tracks · 48 kHz / 24 bit · local only';
    document.getElementById('wave').classList.add('on');
}

// Press R to toggle recording state (demo / manual trigger)
document.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'r') state === 'ready' ? setRecording(6) : setReady();
});

// Tap / click anywhere to toggle (for tablet touch control)
document.addEventListener('click', () => {
    state === 'ready' ? setRecording(6) : setReady();
});
</script>
</body>
</html>
