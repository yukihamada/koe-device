<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolunaOS — Festival Management Dashboard</title>
<meta name="description" content="Control your Koe/Soluna device fleet. Timeline, LED shows, audio routing, and stream management for festivals and events.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--bg1:#111;--bg2:#1a1a1a;--bg3:#222;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --purple:#8B5CF6;--purple-dim:#6D42D4;--purple-glow:rgba(139,92,246,0.15);
  --amber:#F59E0B;--amber-dim:#D97706;
  --green:#4ade80;--green-dim:#22c55e;
  --red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,'Helvetica Neue','Hiragino Sans',sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}

/* grain overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px}

/* ---- TOP BAR ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.2rem;
  background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:200;height:48px}
.topbar .brand{display:flex;align-items:center;gap:0.6rem}
.topbar .brand svg{width:20px;height:20px}
.topbar .brand span{font-size:0.85rem;font-weight:300;letter-spacing:0.25em;color:var(--text2)}
.topbar .brand em{font-style:normal;color:var(--purple);font-weight:600;letter-spacing:0.1em;font-size:0.9rem}
.topbar .status{display:flex;align-items:center;gap:1.2rem;font-size:0.75rem;color:var(--text2)}
.topbar .status .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.topbar .status .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar .status .dot.off{background:var(--red)}
.topbar .clock{font-family:var(--mono);font-size:0.8rem;color:var(--text);letter-spacing:0.05em}

/* ---- TABS ---- */
.tabs{position:fixed;top:48px;left:0;right:0;z-index:190;background:var(--bg1);border-bottom:1px solid var(--border);
  display:flex;gap:0;height:40px;padding:0 0.5rem}
.tab{padding:0 1.2rem;height:40px;display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;
  color:var(--text3);cursor:pointer;border:none;background:none;letter-spacing:0.02em;
  border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.tab svg{width:14px;height:14px;opacity:0.7}

/* ---- MAIN ---- */
main{padding-top:96px;min-height:100vh}
.panel{display:none;padding:1rem 1.2rem 2rem;animation:fadeIn 0.2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- TIMELINE ---- */
.timeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.timeline-header h2{font-size:1rem;font-weight:500;letter-spacing:0.03em}
.timeline-controls{display:flex;gap:0.5rem}
.btn{padding:0.4rem 0.9rem;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--bg2);color:var(--text2);font-size:0.72rem;cursor:pointer;transition:all 0.15s;
  font-family:var(--font);letter-spacing:0.02em}
.btn:hover{border-color:var(--border-hover);color:var(--text)}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.primary:hover{background:var(--purple-dim)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(239,68,68,0.1)}

.now-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green);color:#000;
  padding:0.2rem 0.6rem;border-radius:100px;font-size:0.65rem;font-weight:600;letter-spacing:0.04em;
  animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 4px var(--green)}50%{box-shadow:0 0 14px var(--green)}}

.timeline-container{position:relative;overflow-x:auto;overflow-y:visible;border:1px solid var(--border);
  border-radius:var(--radius);background:var(--bg1)}
.timeline-ruler{display:flex;height:28px;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:var(--bg1);z-index:5}
.timeline-hour{min-width:120px;width:120px;border-right:1px solid var(--border);padding:0.3rem 0.5rem;
  font-size:0.65rem;color:var(--text3);font-family:var(--mono)}
.timeline-body{position:relative}
.timeline-stage{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:56px}
.timeline-stage:last-child{border-bottom:none}
.stage-label{min-width:90px;width:90px;padding:0.5rem;font-size:0.7rem;color:var(--text2);
  border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  background:var(--bg);flex-shrink:0;font-weight:500;letter-spacing:0.04em}
.stage-track{flex:1;position:relative;min-height:56px}
.act-block{position:absolute;top:6px;bottom:6px;border-radius:var(--radius-sm);
  display:flex;align-items:center;padding:0 0.6rem;cursor:grab;font-size:0.68rem;font-weight:500;
  transition:box-shadow 0.15s;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  border:1px solid rgba(255,255,255,0.08)}
.act-block:hover{box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.act-block.dragging{opacity:0.5;cursor:grabbing}
.act-block .act-time{font-size:0.58rem;color:rgba(255,255,255,0.6);margin-left:0.5rem;font-family:var(--mono)}

.now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--green);z-index:4;
  pointer-events:none;box-shadow:0 0 8px var(--green)}
.now-line::before{content:'NOW';position:absolute;top:-22px;left:-14px;font-size:0.55rem;
  color:var(--green);font-weight:700;letter-spacing:0.08em}

/* ---- FLEET ---- */
.fleet-summary{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
.fleet-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:0.6rem 1rem;display:flex;flex-direction:column;min-width:120px}
.fleet-stat .num{font-size:1.4rem;font-weight:600;font-family:var(--mono)}
.fleet-stat .label{font-size:0.65rem;color:var(--text3);margin-top:0.15rem;letter-spacing:0.04em}
.fleet-stat.online .num{color:var(--green)}
.fleet-stat.offline .num{color:var(--red)}

.fleet-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem;flex-wrap:wrap;gap:0.5rem}
.fleet-toolbar .view-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.fleet-toolbar .view-toggle button{padding:0.35rem 0.7rem;border:none;background:none;color:var(--text3);
  cursor:pointer;font-size:0.7rem;transition:all 0.15s}
.fleet-toolbar .view-toggle button.active{background:var(--purple);color:#fff}

.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.6rem}
.device-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:0.7rem;cursor:pointer;transition:all 0.15s;position:relative}
.device-card:hover{border-color:var(--border-hover);transform:translateY(-1px)}
.device-card.selected{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple)}
.device-card .d-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem}
.device-card .d-name{font-size:0.78rem;font-weight:500}
.device-card .d-type{font-size:0.6rem;color:var(--text3);background:var(--bg3);padding:0.1rem 0.4rem;
  border-radius:100px;letter-spacing:0.04em}
.device-card .d-status{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:var(--text3)}
.device-card .d-metrics{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem;margin-top:0.4rem}
.device-card .d-metric{font-size:0.62rem;color:var(--text3)}
.device-card .d-metric strong{color:var(--text2);font-weight:500}

.d-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:2px}
.d-bar-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* venue map */
.venue-map{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;display:none}
.venue-map.active{display:block}
.venue-map svg{width:100%;height:100%}
.map-device{cursor:move;transition:opacity 0.15s}
.map-device:hover{opacity:0.8}
.map-device text{font-size:9px;fill:var(--text2);font-family:var(--mono)}

/* ---- LED PROGRAMMER ---- */
.led-toolbar{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap}
.led-presets{display:flex;gap:0.3rem;flex-wrap:wrap}
.led-preset{padding:0.35rem 0.7rem;border-radius:100px;border:1px solid var(--border);background:none;
  color:var(--text2);font-size:0.68rem;cursor:pointer;transition:all 0.15s}
.led-preset:hover{border-color:var(--purple);color:var(--purple)}
.led-preset.active{background:var(--purple);border-color:var(--purple);color:#fff}

.led-timeline{border:1px solid var(--border);border-radius:var(--radius);background:var(--bg1);
  overflow-x:auto;margin-bottom:1rem}
.led-track{display:flex;min-height:60px;position:relative;padding:0.3rem}
.led-cue{min-width:60px;height:50px;border-radius:var(--radius-sm);margin:0 2px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.6rem;
  color:rgba(255,255,255,0.8);transition:transform 0.1s;border:2px solid transparent;flex-shrink:0}
.led-cue:hover{transform:scale(1.05)}
.led-cue.selected{border-color:#fff}
.led-cue .cue-label{font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.led-cue .cue-dur{font-size:0.55rem;opacity:0.7;font-family:var(--mono)}

.bpm-control{display:flex;align-items:center;gap:0.5rem;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:0.4rem 0.8rem}
.bpm-control label{font-size:0.65rem;color:var(--text3)}
.bpm-control input{width:50px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:0.8rem;text-align:center;padding:0.2rem;font-family:var(--mono)}
.bpm-control .tap-btn{padding:0.3rem 0.6rem;border-radius:var(--radius-sm);border:1px solid var(--amber);
  background:none;color:var(--amber);font-size:0.65rem;cursor:pointer;font-weight:600;transition:all 0.1s}
.bpm-control .tap-btn:active{background:var(--amber);color:#000}

.color-picker-row{display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem}
.color-picker-row label{font-size:0.7rem;color:var(--text2)}
.color-picker-row input[type=color]{width:36px;height:28px;border:none;border-radius:var(--radius-sm);
  cursor:pointer;background:none}
.color-swatches{display:flex;gap:4px}
.color-swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all 0.1s}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:#fff}

/* ---- AUDIO MATRIX ---- */
.matrix-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg1)}
.matrix-table{border-collapse:collapse;min-width:600px}
.matrix-table th{padding:0.4rem 0.6rem;font-size:0.65rem;color:var(--text3);font-weight:400;
  letter-spacing:0.03em;border:1px solid var(--border);background:var(--bg);position:sticky}
.matrix-table th.row-head{text-align:right;min-width:100px;left:0;z-index:2}
.matrix-table th.col-head{text-align:center;top:0;z-index:3;writing-mode:vertical-lr;
  transform:rotate(180deg);height:80px}
.matrix-table td{border:1px solid var(--border);padding:0;text-align:center;width:52px;height:42px}
.matrix-cell{width:100%;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.1s}
.matrix-cell.off{background:var(--bg2)}
.matrix-cell.off:hover{background:var(--bg3)}
.matrix-cell.on{background:var(--purple-glow)}
.matrix-cell .route-dot{width:10px;height:10px;border-radius:50%;transition:all 0.15s}
.matrix-cell.off .route-dot{background:var(--bg3);border:1px solid var(--border)}
.matrix-cell.on .route-dot{background:var(--purple);box-shadow:0 0 8px var(--purple)}

.gain-slider{width:40px;-webkit-appearance:none;appearance:none;height:3px;background:var(--bg3);
  border-radius:2px;outline:none;margin-top:4px}
.gain-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:var(--purple);cursor:pointer}

/* ---- STREAM ---- */
.stream-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:800px){.stream-grid{grid-template-columns:1fr}}
.stream-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.stream-card h3{font-size:0.8rem;font-weight:500;margin-bottom:0.6rem;letter-spacing:0.02em}
.stream-preview{width:100%;aspect-ratio:16/9;background:var(--bg);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:0.75rem;
  border:1px solid var(--border);margin-bottom:0.6rem;position:relative;overflow:hidden}
.stream-preview .no-signal{display:flex;flex-direction:column;align-items:center;gap:0.3rem;opacity:0.5}
.stream-preview .no-signal svg{width:32px;height:32px}
.stream-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:0.6rem}
.stream-stat{text-align:center}
.stream-stat .val{font-size:1.1rem;font-weight:600;font-family:var(--mono)}
.stream-stat .lbl{font-size:0.6rem;color:var(--text3)}
.stream-input{width:100%;padding:0.4rem 0.6rem;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:0.72rem;font-family:var(--mono)}

/* ---- TICKETS ---- */
.ticket-dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.8rem;margin-bottom:1.2rem}
.ticket-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;text-align:center}
.ticket-card .big{font-size:2rem;font-weight:700;font-family:var(--mono)}
.ticket-card .sub{font-size:0.65rem;color:var(--text3);margin-top:0.2rem}
.ticket-card.warn{border-color:var(--amber)}
.ticket-card.warn .big{color:var(--amber)}
.capacity-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:0.5rem}
.capacity-fill{height:100%;border-radius:4px;transition:width 0.5s}

.scan-area{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;text-align:center;max-width:400px}
.scan-area h3{font-size:0.85rem;margin-bottom:0.8rem}
.scan-input{width:100%;padding:0.6rem 1rem;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:1rem;text-align:center;
  font-family:var(--mono);letter-spacing:0.1em}
.scan-result{margin-top:0.8rem;padding:0.6rem;border-radius:var(--radius-sm);font-size:0.8rem;display:none}
.scan-result.ok{display:block;background:rgba(74,222,128,0.1);border:1px solid var(--green);color:var(--green)}
.scan-result.fail{display:block;background:rgba(239,68,68,0.1);border:1px solid var(--red);color:var(--red)}
.recent-scans{margin-top:1rem;max-height:200px;overflow-y:auto}
.recent-scans table{width:100%;border-collapse:collapse;font-size:0.68rem}
.recent-scans th{text-align:left;padding:0.3rem 0.5rem;color:var(--text3);border-bottom:1px solid var(--border);font-weight:400}
.recent-scans td{padding:0.3rem 0.5rem;border-bottom:1px solid var(--border);color:var(--text2)}

/* ---- SCROLLBAR ---- */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#333}

/* ---- RESPONSIVE ---- */
@media(max-width:768px){
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .device-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .fleet-summary{gap:0.5rem}
  .fleet-stat{min-width:90px;padding:0.4rem 0.6rem}
  .fleet-stat .num{font-size:1.1rem}
  .matrix-table th.col-head{height:60px}
}
</style>

<main>

<!-- ===== TIMELINE PANEL ===== -->
<div class="panel active" id="panel-timeline">
  <div class="timeline-header">
    <div style="display:flex;align-items:center;gap:0.8rem">
      <h2>Event Timeline</h2>
      <span class="now-badge">LIVE</span>
    </div>

      <button class="btn" onclick="zoomTimeline(-1)">- Zoom</button>
      <button class="btn" onclick="zoomTimeline(1)">+ Zoom</button>
      <button class="btn" onclick="scrollToNow()">Go to Now</button>

    </div>
  </div>
  <div class="timeline-container" id="timeline-container">
    <div class="timeline-ruler" id="timeline-ruler"></div>
    <div class="timeline-body" id="timeline-body">
      <div class="now-line" id="now-line"></div>

<script>
// ============================================================
//  SolunaOS — Festival Management Dashboard
//  Connects to Koe Hub (ws://hub-ip:3000/ws/mixer)
//  and STAGE server (ws://stage-ip:8765)
// ============================================================

const HUB_WS = 'ws://localhost:3000/ws/mixer';
const STAGE_WS = 'ws://localhost:8765';
const LED_API = 'http://localhost:3000/api/led';
let hubSocket = null, stageSocket = null;

// ---- Clock ----
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toTimeString().slice(0,8);
  requestAnimationFrame(updateClock);
}
updateClock();

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });
});

// ---- WebSocket connections ----
function connectHub() {
  try {
    hubSocket = new WebSocket(HUB_WS);
    hubSocket.onopen = () => updateConnectionDot(0, true);
    hubSocket.onclose = () => { updateConnectionDot(0, false); setTimeout(connectHub, 5000); };
    hubSocket.onmessage = (e) => handleHubMessage(JSON.parse(e.data));
  } catch(_) { setTimeout(connectHub, 5000); }
}

function connectStage() {
  try {
    stageSocket = new WebSocket(STAGE_WS);
    stageSocket.onopen = () => updateConnectionDot(1, true);
    stageSocket.onclose = () => { updateConnectionDot(1, false); setTimeout(connectStage, 5000); };
    stageSocket.onmessage = (e) => handleStageMessage(JSON.parse(e.data));
  } catch(_) { setTimeout(connectStage, 5000); }
}

function updateConnectionDot(idx, on) {
  const dots = document.querySelectorAll('.topbar .dot');
  if (dots[idx]) { dots[idx].className = 'dot ' + (on ? 'on' : 'off'); }
}

function handleHubMessage(msg) {
  if (msg.type === 'device_status') updateDeviceStatus(msg.devices);
  if (msg.type === 'audio_levels') updateAudioLevels(msg.levels);
}
function handleStageMessage(msg) {
  // handle stage-specific messages
}

// ---- TIMELINE ----
let timelineZoom = 1;
const HOUR_BASE = 120;

const sampleActs = [
  { id:1, name:'Soundcheck', stage:'MAIN', start:14, dur:1, color:'#374151' },
  { id:2, name:'DJ Kaze', stage:'MAIN', start:16, dur:1.5, color:'#7c3aed' },
  { id:3, name:'Soluna Collective', stage:'MAIN', start:18, dur:2, color:'#8B5CF6' },
  { id:4, name:'Headliner', stage:'MAIN', start:20.5, dur:2.5, color:'#6d28d9' },
  { id:5, name:'Ambient Set', stage:'TENT', start:15, dur:3, color:'#0891b2' },
  { id:6, name:'Live Coding', stage:'TENT', start:18.5, dur:2, color:'#0d9488' },
  { id:7, name:'Bass Rig Test', stage:'SUB', start:14.5, dur:0.5, color:'#b91c1c' },
  { id:8, name:'Low End Theory', stage:'SUB', start:17, dur:3, color:'#dc2626' },
  { id:9, name:'Chill Zone', stage:'LOUNGE', start:15, dur:8, color:'#ca8a04' },
];
const stages = ['MAIN', 'TENT', 'SUB', 'LOUNGE'];
const timeStart = 12, timeEnd = 24;

function renderTimeline() {
  const hourW = HOUR_BASE * timelineZoom;
  const ruler = document.getElementById('timeline-ruler');
  const body = document.getElementById('timeline-body');

  // ruler
  ruler.innerHTML = '<div style="min-width:90px;width:90px;border-right:1px solid var(--border)"></div>';
  for (let h = timeStart; h < timeEnd; h++) {
    ruler.innerHTML += `<div class="timeline-hour" style="min-width:${hourW}px;width:${hourW}px">${String(h).padStart(2,'0')}:00</div>`;
  }

  // stages
  let html = '';
  stages.forEach(s => {
    html += `<div class="timeline-stage"><div class="stage-label">${s}</div><div class="stage-track" data-stage="${s}"`;
    html += ` ondragover="event.preventDefault()" ondrop="dropAct(event,'${s}')">`;
    sampleActs.filter(a => a.stage === s).forEach(a => {
      const left = (a.start - timeStart) * hourW;
      const width = a.dur * hourW;
      html += `<div class="act-block" style="left:${left}px;width:${width}px;background:${a.color}"
        draggable="true" ondragstart="dragAct(event,${a.id})" data-id="${a.id}">
        ${a.name}<span class="act-time">${fmtTime(a.start)}-${fmtTime(a.start+a.dur)}</span></div>`;
    });
    html += '</div></div>';
  });
  body.innerHTML = '<div class="now-line" id="now-line"></div>' + html;
  updateNowLine();
}

function fmtTime(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}

function updateNowLine() {
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  const hourW = HOUR_BASE * timelineZoom;
  const left = 90 + (h - timeStart) * hourW;
  const line = document.getElementById('now-line');
  if (line) { line.style.left = left + 'px'; }
}
setInterval(updateNowLine, 30000);

function zoomTimeline(dir) {
  timelineZoom = Math.max(0.5, Math.min(3, timelineZoom + dir * 0.25));
  renderTimeline();
}

function scrollToNow() {
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  const hourW = HOUR_BASE * timelineZoom;
  const container = document.getElementById('timeline-container');
  container.scrollLeft = Math.max(0, (h - timeStart) * hourW - container.clientWidth / 2);
}

let dragActId = null;
function dragAct(e, id) { dragActId = id; e.dataTransfer.effectAllowed = 'move'; }
function dropAct(e, stage) {
  e.preventDefault();
  if (dragActId == null) return;
  const act = sampleActs.find(a => a.id === dragActId);
  if (act) { act.stage = stage; renderTimeline(); saveTimelineData(); }
  dragActId = null;
}

function addAct() {
  const name = prompt('Act name:');
  if (!name) return;
  const startH = parseFloat(prompt('Start hour (e.g. 19.5):') || '18');
  const dur = parseFloat(prompt('Duration in hours (e.g. 1.5):') || '1');
  const stage = prompt('Stage (' + stages.join('/') + '):', 'MAIN') || 'MAIN';
  const colors = ['#7c3aed','#0891b2','#dc2626','#ca8a04','#059669','#be185d'];
  sampleActs.push({ id: Date.now(), name, stage, start: startH, dur, color: colors[Math.floor(Math.random()*colors.length)] });
  renderTimeline();
  saveTimelineData();
}

// ---- FLEET ----
const deviceTypes = ['STAGE','FILL','SUB','COIN'];
let devices = [];
let selectedDevices = new Set();

function generateDevices() {
  devices = [];
  const counts = { STAGE: 4, FILL: 18, SUB: 2, COIN: 342 };
  Object.entries(counts).forEach(([type, count]) => {
    for (let i = 1; i <= count; i++) {
      devices.push({
        id: `${type.toLowerCase()}-${String(i).padStart(3,'0')}`,
        type, name: `${type}-${String(i).padStart(3,'0')}`,
        online: Math.random() > 0.05,
        battery: type === 'COIN' ? Math.floor(Math.random()*60+40) : 100,
        audioLevel: Math.floor(Math.random()*100),
        ledPattern: 'rainbow',
        x: Math.random()*700+50, y: Math.random()*350+50
      });
    }
  });
}
generateDevices();

function renderFleetSummary() {
  const el = document.getElementById('fleet-summary');
  const online = devices.filter(d => d.online).length;
  const offline = devices.length - online;
  let html = `<div class="fleet-stat online"><div class="num">${online}</div><div class="label">ONLINE</div></div>`;
  html += `<div class="fleet-stat offline"><div class="num">${offline}</div><div class="label">OFFLINE</div></div>`;
  deviceTypes.forEach(t => {
    const c = devices.filter(d => d.type === t && d.online).length;
    const total = devices.filter(d => d.type === t).length;
    html += `<div class="fleet-stat"><div class="num">${c}<span style="font-size:0.7rem;color:var(--text3)">/${total}</span></div><div class="label">${t}</div></div>`;
  });
  el.innerHTML = html;
  document.getElementById('device-count-top').textContent = `${online} devices`;
}

function renderDeviceGrid() {
  const grid = document.getElementById('device-grid');
  // Show a subset for COIN to avoid DOM overload
  const shown = devices.filter(d => d.type !== 'COIN').concat(devices.filter(d => d.type === 'COIN').slice(0, 20));
  const coinHidden = devices.filter(d => d.type === 'COIN').length - 20;

  let html = '';
  shown.forEach(d => {
    const sel = selectedDevices.has(d.id) ? 'selected' : '';
    const statusColor = d.online ? 'var(--green)' : 'var(--red)';
    const battColor = d.battery > 30 ? 'var(--green)' : d.battery > 15 ? 'var(--amber)' : 'var(--red)';
    html += `<div class="device-card ${sel}" onclick="toggleDevice('${d.id}')" data-id="${d.id}">
      <div class="d-header">
        <span class="d-name">${d.name}</span>
        <span class="d-type">${d.type}</span>
      </div>
      <div class="d-status"><span class="dot ${d.online?'on':'off'}"></span>${d.online?'Online':'Offline'}</div>
      <div class="d-metrics">
        <div class="d-metric">Batt: <strong>${d.battery}%</strong>
          <div class="d-bar"><div class="d-bar-fill" style="width:${d.battery}%;background:${battColor}"></div></div>
        </div>
        <div class="d-metric">Audio: <strong>${d.audioLevel}%</strong>
          <div class="d-bar"><div class="d-bar-fill" style="width:${d.audioLevel}%;background:var(--purple)"></div></div>
        </div>
      </div>
    </div>`;
  });
  if (coinHidden > 0) {
    html += `<div class="device-card" style="display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:0.75rem;cursor:default">
      +${coinHidden} more COINs</div>`;
  }
  grid.innerHTML = html;
}

function renderVenueMap() {
  const svg = document.getElementById('venue-svg');
  // Remove old device markers
  svg.querySelectorAll('.map-device').forEach(el => el.remove());

  // Only draw non-COIN devices + a sample of COINs on map
  const mapDevices = devices.filter(d => d.type !== 'COIN').concat(devices.filter(d => d.type === 'COIN').slice(0,30));
  const typeColors = { STAGE:'#8B5CF6', FILL:'#3b82f6', SUB:'#ef4444', COIN:'#F59E0B' };
  const typeRadius = { STAGE:8, FILL:6, SUB:7, COIN:3 };

  mapDevices.forEach(d => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('map-device');
    g.setAttribute('data-id', d.id);
    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', d.x); c.setAttribute('cy', d.y);
    c.setAttribute('r', typeRadius[d.type]);
    c.setAttribute('fill', d.online ? typeColors[d.type] : '#333');
    c.setAttribute('opacity', d.online ? '0.9' : '0.3');
    g.appendChild(c);
    if (d.type !== 'COIN') {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', d.x); t.setAttribute('y', parseFloat(d.y) + typeRadius[d.type] + 12);
      t.setAttribute('text-anchor','middle');
      t.textContent = d.name;
      g.appendChild(t);
    }
    // Drag on map
    let dragging = false, ox, oy;
    g.addEventListener('mousedown', e => { dragging = true; ox = e.clientX; oy = e.clientY; e.preventDefault(); });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const svgRect = svg.getBoundingClientRect();
      const scaleX = 800 / svgRect.width, scaleY = 450 / svgRect.height;
      d.x = Math.max(10, Math.min(790, d.x + (e.clientX - ox) * scaleX));
      d.y = Math.max(10, Math.min(440, d.y + (e.clientY - oy) * scaleY));
      ox = e.clientX; oy = e.clientY;
      c.setAttribute('cx', d.x); c.setAttribute('cy', d.y);
      if (g.querySelector('text')) { g.querySelector('text').setAttribute('x', d.x); g.querySelector('text').setAttribute('y', d.y + typeRadius[d.type] + 12); }
    });
    document.addEventListener('mouseup', () => { dragging = false; });

    svg.appendChild(g);
  });
}

function toggleDevice(id) {
  if (selectedDevices.has(id)) selectedDevices.delete(id);
  else selectedDevices.add(id);
  renderDeviceGrid();
}

function setFleetView(view, btn) {
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('device-grid').style.display = view === 'grid' ? 'grid' : 'none';
  const map = document.getElementById('venue-map');
  map.style.display = view === 'map' ? 'block' : 'none';
  if (view === 'map') renderVenueMap();
}

function fleetAction(action) {
  if (selectedDevices.size === 0) { alert('Select devices first'); return; }
  const ids = [...selectedDevices];
  if (action === 'led') {
    const pattern = prompt('LED pattern (rainbow/pulse/strobe/wave/breathe/solid):', 'rainbow');
    if (!pattern) return;
    sendToHub({ type: 'set_led', devices: ids, pattern });
  } else if (action === 'volume') {
    const vol = parseInt(prompt('Volume (0-100):', '80'));
    if (isNaN(vol)) return;
    sendToHub({ type: 'set_volume', devices: ids, volume: vol });
  } else if (action === 'reboot') {
    if (!confirm(`Reboot ${ids.length} device(s)?`)) return;
    sendToHub({ type: 'reboot', devices: ids });
  }
}

function updateDeviceStatus(statusList) {
  if (!Array.isArray(statusList)) return;
  statusList.forEach(s => {
    const d = devices.find(d => d.id === s.id);
    if (d) { Object.assign(d, s); }
  });
  renderFleetSummary();
  renderDeviceGrid();
}

function updateAudioLevels(levels) {
  // levels: { id: number }
  Object.entries(levels).forEach(([id, level]) => {
    const d = devices.find(d => d.id === id);
    if (d) d.audioLevel = level;
  });
}

// ---- LED SHOW PROGRAMMER ----
let ledCues = [
  { id: 1, pattern: 'rainbow', color: '#8B5CF6', duration: 4 },
  { id: 2, pattern: 'pulse', color: '#ef4444', duration: 2 },
  { id: 3, pattern: 'strobe', color: '#ffffff', duration: 1 },
  { id: 4, pattern: 'wave', color: '#3b82f6', duration: 4 },
  { id: 5, pattern: 'breathe', color: '#4ade80', duration: 3 },
  { id: 6, pattern: 'solid', color: '#F59E0B', duration: 2 },
];
let selectedCue = null;

function renderLedCues() {
  const track = document.getElementById('led-track');
  track.innerHTML = '';
  ledCues.forEach((cue, i) => {
    const w = cue.duration * 60;
    const div = document.createElement('div');
    div.className = 'led-cue' + (selectedCue === cue.id ? ' selected' : '');
    div.style.width = w + 'px';
    div.style.background = hexToRgba(cue.color, 0.35);
    div.style.borderColor = selectedCue === cue.id ? '#fff' : 'transparent';
    div.innerHTML = `<span class="cue-label">${cue.pattern}</span><span class="cue-dur">${cue.duration}s</span>`;
    div.onclick = () => { selectedCue = selectedCue === cue.id ? null : cue.id; renderLedCues(); };
    div.ondblclick = () => editCue(cue);
    track.appendChild(div);
  });
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function addLedCue() {
  const color = document.getElementById('led-color').value;
  const activePreset = document.querySelector('.led-preset.active');
  const pattern = activePreset ? activePreset.dataset.pattern : 'solid';
  ledCues.push({ id: Date.now(), pattern, color, duration: 2 });
  renderLedCues();
  saveLedData();
}

function editCue(cue) {
  const dur = parseFloat(prompt('Duration (seconds):', cue.duration));
  if (!isNaN(dur) && dur > 0) { cue.duration = dur; renderLedCues(); saveLedData(); }
}

function clearLedCues() {
  if (!confirm('Clear all cues?')) return;
  ledCues = [];
  renderLedCues();
  saveLedData();
}

function previewLedShow() {
  const payload = { type: 'led_show', cues: ledCues };
  sendToHub(payload);
  // Also try direct LED API
  fetch(LED_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(() => {});
}

function exportLedShow() {
  const json = JSON.stringify({ version: 1, bpm: parseInt(document.getElementById('bpm-input').value), cues: ledCues }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'soluna-led-show.json';
  a.click();
}

function importLedShow() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.cues) { ledCues = data.cues; renderLedCues(); saveLedData(); }
        if (data.bpm) document.getElementById('bpm-input').value = data.bpm;
      } catch(err) { alert('Invalid JSON file'); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

// LED preset buttons
document.querySelectorAll('.led-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.led-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Color swatches
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    document.getElementById('led-color').value = sw.dataset.color;
  });
});

// Tap tempo
let tapTimes = [];
document.getElementById('tap-tempo-btn').addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
    const bpm = Math.round(60000 / avg);
    document.getElementById('bpm-input').value = Math.max(40, Math.min(300, bpm));
  }
  // Reset if gap > 3s
  setTimeout(() => { if (performance.now() - tapTimes[tapTimes.length-1] > 3000) tapTimes = []; }, 3100);
});

// ---- AUDIO MATRIX ----
const audioSources = ['STAGE L', 'STAGE R', 'Hub Ch.1', 'Hub Ch.2', 'USB', 'Bluetooth'];
const audioOutputs = ['FILL Zone A', 'FILL Zone B', 'SUB Group', 'Monitor', 'Stream', 'Recording'];
let matrixState = {};

function initMatrix() {
  audioSources.forEach(s => {
    audioOutputs.forEach(o => {
      matrixState[s + '|' + o] = { on: false, gain: 0.8 };
    });
  });
  // Default routing
  ['STAGE L|FILL Zone A','STAGE R|FILL Zone B','STAGE L|SUB Group','STAGE R|SUB Group',
   'STAGE L|Stream','STAGE R|Stream','STAGE L|Recording','STAGE R|Recording'].forEach(k => {
    matrixState[k] = { on: true, gain: 0.8 };
  });
}
initMatrix();

function renderMatrix() {
  const table = document.getElementById('audio-matrix');
  let html = '<thead><tr><th class="row-head"></th>';
  audioOutputs.forEach(o => { html += `<th class="col-head">${o}</th>`; });
  html += '</tr></thead><tbody>';
  audioSources.forEach(s => {
    html += `<tr><th class="row-head">${s}</th>`;
    audioOutputs.forEach(o => {
      const key = s + '|' + o;
      const st = matrixState[key];
      html += `<td><div class="matrix-cell ${st.on ? 'on' : 'off'}" onclick="toggleRoute('${key}')">
        <div><div class="route-dot"></div>${st.on ? `<input type="range" class="gain-slider" min="0" max="100" value="${Math.round(st.gain*100)}"
          onclick="event.stopPropagation()" oninput="setGain('${key}',this.value)">` : ''}</div>
      </div></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function toggleRoute(key) {
  matrixState[key].on = !matrixState[key].on;
  renderMatrix();
}

function setGain(key, val) {
  matrixState[key].gain = parseInt(val) / 100;
}

function resetMatrix() {
  if (!confirm('Reset all routes?')) return;
  initMatrix();
  renderMatrix();
}

function applyMatrix() {
  const routes = {};
  Object.entries(matrixState).forEach(([k, v]) => {
    if (v.on) routes[k] = v.gain;
  });
  sendToHub({ type: 'audio_matrix', routes });
}

// ---- STREAM ----
let streaming = false, recording = false;
let streamStart = null, recStart = null;

function toggleStream() {
  streaming = !streaming;
  const btn = document.getElementById('stream-toggle');
  if (streaming) {
    btn.textContent = 'Stop Stream';
    btn.classList.add('danger');
    btn.classList.remove('primary');
    streamStart = Date.now();
    sendToHub({ type: 'stream_start',
      url: document.getElementById('stream-url').value,
      key: document.getElementById('stream-key').value,
      protocol: document.getElementById('stream-proto').value
    });
  } else {
    btn.textContent = 'Start Stream';
    btn.classList.remove('danger');
    btn.classList.add('primary');
    streamStart = null;
    document.getElementById('stream-uptime').textContent = '00:00';
    sendToHub({ type: 'stream_stop' });
  }
}

function refreshStream() {
  document.getElementById('stream-viewers').textContent = Math.floor(Math.random() * 500);
  document.getElementById('stream-bitrate').textContent = (3500 + Math.floor(Math.random() * 2000));
}

function toggleRecording() {
  recording = !recording;
  const btn = document.getElementById('rec-toggle');
  if (recording) {
    btn.textContent = 'Stop Recording';
    btn.style.background = 'rgba(239,68,68,0.15)';
    recStart = Date.now();
    document.getElementById('rec-status').textContent = 'Recording';
    document.getElementById('rec-status').style.color = 'var(--red)';
    sendToHub({ type: 'rec_start' });
  } else {
    btn.textContent = 'Start Recording';
    btn.style.background = '';
    recStart = null;
    document.getElementById('rec-status').textContent = 'Idle';
    document.getElementById('rec-status').style.color = 'var(--text3)';
    document.getElementById('rec-duration').textContent = '00:00:00';
    sendToHub({ type: 'rec_stop' });
  }
}

setInterval(() => {
  if (streaming && streamStart) {
    const s = Math.floor((Date.now() - streamStart) / 1000);
    document.getElementById('stream-uptime').textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }
  if (recording && recStart) {
    const s = Math.floor((Date.now() - recStart) / 1000);
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    document.getElementById('rec-duration').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    document.getElementById('rec-size').textContent = (s * 0.44).toFixed(1) + ' MB';
  }
}, 1000);

// ---- TICKETS ----
const zones = [
  { name: 'Main Floor', capacity: 2000, current: 0 },
  { name: 'VIP Area', capacity: 200, current: 0 },
  { name: 'Tent Stage', capacity: 500, current: 0 },
  { name: 'Lounge', capacity: 150, current: 0 },
];
let totalCheckedIn = 0, totalTickets = 3000;
const scanHistory = [];

function renderTickets() {
  const dash = document.getElementById('ticket-dashboard');
  let html = `<div class="ticket-card"><div class="big">${totalCheckedIn}</div><div class="sub">CHECKED IN</div></div>`;
  html += `<div class="ticket-card"><div class="big">${totalTickets - totalCheckedIn}</div><div class="sub">REMAINING</div></div>`;
  html += `<div class="ticket-card"><div class="big">${devices.filter(d=>d.type==='COIN'&&d.online).length}</div><div class="sub">COINs ACTIVE</div></div>`;
  const pct = Math.round(totalCheckedIn / totalTickets * 100);
  const warn = pct > 85 ? ' warn' : '';
  html += `<div class="ticket-card${warn}"><div class="big">${pct}%</div><div class="sub">CAPACITY</div>
    <div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%;background:${pct>85?'var(--amber)':'var(--green)'}"></div></div></div>`;
  dash.innerHTML = html;

  // zone capacity
  const zc = document.getElementById('zone-capacity');
  zc.innerHTML = zones.map(z => {
    const p = Math.round(z.current / z.capacity * 100);
    const col = p > 90 ? 'var(--red)' : p > 70 ? 'var(--amber)' : 'var(--green)';
    return `<div style="margin-bottom:0.8rem">
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.2rem">
        <span>${z.name}</span><span style="color:var(--text3)">${z.current}/${z.capacity}</span>
      </div>
      <div class="capacity-bar"><div class="capacity-fill" style="width:${p}%;background:${col}"></div></div>
    </div>`;
  }).join('');
}

document.getElementById('coin-scan').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  e.target.value = '';

  const result = document.getElementById('scan-result');
  const isValid = Math.random() > 0.1; // simulate
  if (isValid) {
    totalCheckedIn++;
    const zone = zones[Math.floor(Math.random() * zones.length)];
    zone.current++;
    result.className = 'scan-result ok';
    result.textContent = `Check-in OK — ${zone.name}`;
    scanHistory.unshift({ time: new Date().toTimeString().slice(0,8), id: val, status: 'OK', zone: zone.name });
  } else {
    result.className = 'scan-result fail';
    result.textContent = 'Invalid COIN — Not registered';
    scanHistory.unshift({ time: new Date().toTimeString().slice(0,8), id: val, status: 'FAIL', zone: '—' });
  }

  const log = document.getElementById('scan-log');
  log.innerHTML = scanHistory.slice(0, 20).map(s =>
    `<tr><td>${s.time}</td><td style="font-family:var(--mono)">${s.id}</td>
    <td style="color:${s.status==='OK'?'var(--green)':'var(--red)'}">${s.status}</td><td>${s.zone}</td></tr>`
  ).join('');

  renderTickets();
  setTimeout(() => { result.className = 'scan-result'; }, 3000);
});

// ---- HELPERS ----
function sendToHub(msg) {
  if (hubSocket && hubSocket.readyState === WebSocket.OPEN) {
    hubSocket.send(JSON.stringify(msg));
  }
}

// ---- LocalStorage persistence ----
function saveTimelineData() {
  try { localStorage.setItem('soluna-timeline', JSON.stringify(sampleActs)); } catch(_) {}
}
function loadTimelineData() {
  try {
    const d = localStorage.getItem('soluna-timeline');
    if (d) { const arr = JSON.parse(d); if (Array.isArray(arr) && arr.length) { sampleActs.length = 0; arr.forEach(a => sampleActs.push(a)); } }
  } catch(_) {}
}
function saveLedData() {
  try { localStorage.setItem('soluna-led', JSON.stringify(ledCues)); } catch(_) {}
}
function loadLedData() {
  try {
    const d = localStorage.getItem('soluna-led');
    if (d) { const arr = JSON.parse(d); if (Array.isArray(arr)) { ledCues = arr; } }
  } catch(_) {}
}

// ---- INIT ----
function init() {
  loadTimelineData();
  loadLedData();
  renderTimeline();
  renderFleetSummary();
  renderDeviceGrid();
  renderLedCues();
  renderMatrix();
  // Simulate some ticket activity
  totalCheckedIn = Math.floor(Math.random() * 800 + 400);
  zones.forEach(z => { z.current = Math.floor(Math.random() * z.capacity * 0.6); });
  renderTickets();
  scrollToNow();
  // Try connecting (will silently retry)
  connectHub();
  connectStage();
}

init();
</script>
