<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご注文ありがとうございます — Koe</title>
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',-apple-system,sans-serif;
  background:#0a0a0a;color:#e8e8e8;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;line-height:1.7;
}
.card{
  max-width:560px;width:100%;
  background:linear-gradient(165deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
  border:1px solid rgba(139,92,246,0.2);border-radius:24px;
  padding:3rem;text-align:center;
}
h1{font-size:1.8rem;font-weight:200;margin-bottom:0.5rem;letter-spacing:0.03em;}
.check{
  width:80px;height:80px;margin:0 auto 1.5rem;
  border-radius:50%;background:rgba(139,92,246,0.15);
  display:flex;align-items:center;justify-content:center;
  animation:popIn 0.5s ease-out;
}
.check svg{width:40px;height:40px;color:#8B5CF6;}
@keyframes popIn{
  0%{transform:scale(0);opacity:0;}
  80%{transform:scale(1.1);}
  100%{transform:scale(1);opacity:1;}
}
.subtitle{color:#aaa;font-size:0.95rem;margin-bottom:2rem;}
.timeline{
  display:flex;justify-content:center;gap:0;margin:2rem 0;position:relative;
}
.timeline::before{
  content:'';position:absolute;top:18px;left:15%;right:15%;height:2px;
  background:rgba(255,255,255,0.1);
}
.step{text-align:center;flex:1;position:relative;z-index:1;}
.step .dot{
  width:36px;height:36px;border-radius:50%;margin:0 auto 0.5rem;
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
  border:2px solid rgba(255,255,255,0.15);background:#0a0a0a;
  transition:all 0.3s;
}
.step.active .dot{border-color:#8B5CF6;background:rgba(139,92,246,0.2);color:#8B5CF6;}
.step.done .dot{border-color:#22C55E;background:rgba(34,197,94,0.2);color:#22C55E;}
.step .label{font-size:0.72rem;color:#888;}
.step.active .label{color:#e8e8e8;}
.info{
  text-align:left;background:rgba(255,255,255,0.03);border-radius:12px;padding:1.2rem;
  margin:1.5rem 0;font-size:0.88rem;
}
.info-row{display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.info-row:last-child{border-bottom:none;}
.info-row .label{color:#888;}
.back-link{
  display:inline-block;margin-top:1.5rem;color:#8B5CF6;text-decoration:none;font-size:0.88rem;
  transition:opacity 0.2s;
}
.back-link:hover{opacity:0.8;}
.email-note{color:#666;font-size:0.8rem;margin-top:1rem;}
</style>
<script defer src="https://enabler-analytics.fly.dev/t.js"></script>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>ご注文ありがとうございます</h1>
  <p class="subtitle">注文確認メールをお送りしました。</p>

  <div class="timeline">
    <div class="step done">
      <div class="dot">1</div>
      <div class="label">注文受付</div>
    </div>
    <div class="step active">
      <div class="dot">2</div>
      <div class="label">製造中</div>
    </div>
    <div class="step">
      <div class="dot">3</div>
      <div class="label">発送</div>
    </div>
    <div class="step">
      <div class="dot">4</div>
      <div class="label">お届け</div>
    </div>
  </div>

  <div class="info" id="orderInfo">
    <div class="info-row">
      <span class="label">予定発送日</span>
      <span>今週中</span>
    </div>
    <div class="info-row">
      <span class="label">配送業者</span>
      <span>DHL Express</span>
    </div>
    <div class="info-row">
      <span class="label">お届け目安</span>
      <span>発送後 3-5営業日</span>
    </div>
  </div>

  <p class="email-note">製造が完了次第、発送通知メールをお送りします。<br>ご質問は <a href="mailto:hello@koe.live" style="color:#8B5CF6;">hello@koe.live</a> まで。</p>

  <a href="/" class="back-link">Koe トップページへ戻る</a>
</div>
</body>
</html>
