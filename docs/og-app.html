<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; background:#08080f; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.bg { position:absolute; inset:0; background:radial-gradient(ellipse at 25% 35%, rgba(124,58,237,0.25) 0%, transparent 55%), radial-gradient(ellipse at 75% 70%, rgba(124,58,237,0.12) 0%, transparent 50%), #08080f; }
.content { position:relative; z-index:1; text-align:center; color:#fff; }
h1 { font-size:5rem; font-weight:800; background:linear-gradient(135deg,#a78bfa,#c4b5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:16px; }
.sub { font-size:1.8rem; color:rgba(255,255,255,0.8); margin-bottom:40px; font-weight:400; }
.feats { display:flex; gap:24px; justify-content:center; flex-wrap:wrap; }
.feat { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 20px; font-size:1.1rem; color:rgba(255,255,255,0.85); }
</style></head><body>
<div class="bg"></div>
<div class="content">
  <h1>Koe</h1>
  <div class="sub">ブラウザだけで、みんなと音楽を楽しむ</div>
  <div class="feats">
    <div class="feat">🎵 同期再生</div>
    <div class="feat">🎤 カラオケ</div>
    <div class="feat">🎶 ボーカル除去</div>
    <div class="feat">🐟 声翻訳</div>
    <div class="feat">📝 文字起こし</div>
    <div class="feat">🏟️ 50人+</div>
  </div>
</div>
</body></html>
