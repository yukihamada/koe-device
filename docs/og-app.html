<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; background:#08080f; font-family:-apple-system,'SF Pro Display',sans-serif; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.bg { position:absolute; inset:0; background:radial-gradient(ellipse at 25% 35%, rgba(124,58,237,0.25) 0%, transparent 55%), radial-gradient(ellipse at 75% 70%, rgba(124,58,237,0.12) 0%, transparent 50%), #08080f; }
.content { position:relative; z-index:1; text-align:center; color:#fff; max-width:1050px; }
h1 { font-size:5rem; font-weight:800; background:linear-gradient(135deg,#a78bfa,#c4b5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px; }
.sub { font-size:1.6rem; color:rgba(255,255,255,0.8); margin-bottom:32px; font-weight:400; }
.feats { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.feat { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:10px 16px; font-size:0.95rem; color:rgba(255,255,255,0.85); }
.bottom { font-size:0.9rem; color:rgba(255,255,255,0.4); }
</style></head><body>
<div class="bg"></div>
<div class="content">
  <h1>Koe</h1>
  <div class="sub">ブラウザだけで、みんなと音楽を楽しむ</div>
  <div class="feats">
    <div class="feat">🎵 同期再生</div>
    <div class="feat">🎤 カラオケ</div>
    <div class="feat">🎶 ボーカル除去</div>
    <div class="feat">🎛️ EQ</div>
    <div class="feat">🎹 MIDI</div>
    <div class="feat">🎧 DJ</div>
    <div class="feat">🐟 声翻訳</div>
    <div class="feat">🏆 ランキング</div>
    <div class="feat">🎚️ マルチ録音</div>
    <div class="feat">🏟️ 50人+</div>
  </div>
  <div class="bottom">アプリ不要 · 完全無料 · koe.live/app</div>
</div>
</body></html>
